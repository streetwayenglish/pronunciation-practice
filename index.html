<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Street Way - Pronunciation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#fafaf8;--yellow:#f5c842;
  --g100:#f0efeb;--g200:#e0dfd9;--g400:#9e9d97;--g600:#5a5955;
  --green:#2d7a3a;--gl:#e8f5eb;
  --red:#c0392b;--rl:#fdecea;
  --amb:#b7770d;--aml:#fef3e0;
  --r:16px;--rs:10px;--rx:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--black);min-height:100vh}
.hdr{text-align:center;padding:2rem 1rem 1rem}
.logo{height:90px;width:auto;display:block;margin:0 auto 12px}
.ttl{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--black)}
.main{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.pb{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.pt{flex:1;height:4px;background:var(--g200);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--yellow);border-radius:2px;transition:width .4s}
.pl{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--g400);white-space:nowrap}
.card{background:var(--black);border-radius:var(--r);padding:2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:var(--yellow);border-radius:50%;opacity:.06;pointer-events:none}
.cl{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);margin-bottom:12px}
.sr{display:flex;align-items:flex-start;gap:12px}
.snt{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--white);line-height:1.3;margin-bottom:1.5rem;flex:1}
.lbtn{width:44px;height:44px;border-radius:50%;background:var(--yellow);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:transform .15s,opacity .15s;position:relative;z-index:2}
.lbtn:hover{transform:scale(1.08)}
.lbtn.sp{animation:spp .8s infinite alternate}
@keyframes spp{from{box-shadow:0 0 0 0 rgba(245,200,66,.5)}to{box-shadow:0 0 0 10px rgba(245,200,66,0)}}
.nr{display:flex;gap:8px;margin-bottom:1.5rem}
.nb{flex:1;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--rs);font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;font-family:'DM Sans',sans-serif}
.nb:hover{background:rgba(255,255,255,.14);color:#fff}
.nb:disabled{opacity:.25;cursor:not-allowed}
.ms{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1.5rem;background:rgba(255,255,255,.05);border-radius:var(--rs);border:1px solid rgba(255,255,255,.08)}
.mb{width:80px;height:80px;border-radius:50%;border:none;background:var(--yellow);color:var(--black);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.mb:hover{transform:scale(1.06)}
.mb.rec{background:var(--red);color:#fff;animation:rp 1s infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.4)}50%{box-shadow:0 0 0 16px rgba(192,57,43,0)}}
.ml{font-size:13px;color:rgba(255,255,255,.5);text-align:center}
.trow{display:flex;align-items:center;gap:8px;width:100%}
.tb{flex:1;min-height:52px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:var(--rx);padding:12px 14px;font-size:15px;color:var(--white);line-height:1.5}
.ph{color:rgba(255,255,255,.3);font-style:italic}
.playbtn{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;display:none}
.playbtn.show{display:flex}
.playbtn.playing{background:var(--yellow);color:var(--black);border-color:var(--yellow)}
.ab{width:100%;padding:14px;margin-top:1rem;background:var(--yellow);color:var(--black);border:none;border-radius:var(--rs);font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:opacity .15s}
.ab:disabled{opacity:.3;cursor:not-allowed}
/* Feedback */
.fbc{background:var(--white);border:2px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-top:1rem}
.fbt{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g400);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hr{border:none;border-top:1px solid var(--g200);margin:16px 0}
/* Score circle */
.scr{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.circ{display:flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;font-family:'DM Sans',sans-serif;font-weight:700;flex-shrink:0;font-size:24px;line-height:1;letter-spacing:-0.02em}
.cg{background:var(--gl);color:var(--green)}
.co{background:var(--aml);color:var(--amb)}
.cr{background:var(--rl);color:var(--red)}
.sl{font-size:14px;color:var(--g600);line-height:1.5}
.sl strong{color:var(--black);font-weight:700;font-family:'Syne',sans-serif;font-size:16px}
/* Word pills */
.wp{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.pill{display:inline-flex;flex-direction:column;align-items:center;padding:6px 10px;border-radius:8px;min-width:52px;cursor:help}
.pt2{font-size:13px;font-weight:600;font-family:'Syne',sans-serif}
.ps{font-size:10px;margin-top:2px;opacity:.8}
.pg{background:var(--gl);color:var(--green)}
.po{background:var(--aml);color:var(--amb)}
.prr{background:var(--rl);color:var(--red)}
.sylrow{display:flex;gap:0px;margin-top:3px;flex-wrap:wrap;justify-content:center}
.syl{font-size:12px;font-weight:700;font-family:'Syne',sans-serif;}
.syl-ok{color:inherit;}
.syl-bad{color:inherit;border-bottom:2px solid var(--red);}
/* Profile cards */
.profile{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.pmet{background:var(--g100);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.pmet-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);margin-bottom:6px}
.pmet-score{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:var(--black);line-height:1}
.pmet-bar{height:4px;background:var(--g200);border-radius:2px;margin-top:8px;overflow:hidden}
.pmet-fill{height:100%;border-radius:2px;width:0%;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pmet-fill-g{background:linear-gradient(90deg,#2d7a3a,#4caf50)}
.pmet-fill-o{background:linear-gradient(90deg,#b7770d,#f5a623)}
.pmet-fill-r{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.pmet-icon{position:absolute;top:10px;right:12px;font-size:16px;opacity:.4}
/* Coach */
.coach-wrap{background:#fffef7;border:1px solid #e8e4c8;border-radius:12px;padding:1.25rem}
.cblock{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.cblock:last-child{margin-bottom:0}
.cicon{font-size:15px;flex-shrink:0;margin-top:2px}
.ctext{font-size:15px;line-height:1.75;color:var(--black)}
.ctext .hw{background:#fdecea;color:#791F1F;padding:1px 5px;border-radius:4px;font-weight:600}
.cdiv{border:none;border-top:1px solid #e8e4c8;margin:12px 0}
.coach-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.coach-audio-btn{width:32px;height:32px;border-radius:50%;background:var(--yellow);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .15s,opacity .15s;flex-shrink:0}
.coach-audio-btn:hover{transform:scale(1.08)}
.coach-audio-btn.loading{opacity:.6;cursor:wait}
.coach-audio-btn.playing{animation:spp .8s infinite alternate}
/* Completion */
.ec{background:var(--black);border-radius:var(--r);padding:2.5rem 2rem;text-align:center}
.ei{font-size:48px;margin-bottom:1rem}
.et{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--yellow);margin-bottom:6px}
.es{font-size:15px;color:rgba(255,255,255,.5);margin-bottom:2rem}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
.si{background:rgba(255,255,255,.06);border-radius:var(--rs);padding:12px;text-align:center}
.sn{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--white)}
.sn.g{color:#4caf50}.sn.o{color:var(--yellow)}.sn.rr{color:var(--red)}
.sll{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.avg{display:inline-block;background:var(--yellow);color:var(--black);font-family:'Syne',sans-serif;font-size:32px;font-weight:800;padding:16px 32px;border-radius:var(--rs);margin-bottom:1.5rem}
.avgl{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:.08em}
.rb{padding:12px 28px;background:var(--white);color:var(--black);border:none;border-radius:var(--rs);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
/* Teacher */
.tov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.tmod{background:var(--white);border-radius:var(--r);padding:2rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.tmod h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:1.5rem}
.trow2{display:flex;gap:8px;margin-bottom:8px}
.tinp{flex:1;padding:10px 12px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--g100)}
.tinp:focus{border-color:var(--black);background:#fff}
.tdel{background:none;border:1.5px solid var(--g200);border-radius:var(--rx);padding:6px 10px;font-size:13px;cursor:pointer;color:var(--g400)}
.tdel:hover{background:var(--rl);color:var(--red);border-color:var(--red)}
.tadd{width:100%;padding:10px;background:none;border:1.5px dashed var(--g200);border-radius:var(--rx);font-size:13px;color:var(--g400);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:1.5rem}
.tact{display:flex;gap:8px}
.tsv{flex:1;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--rx);font-size:14px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer}
.tcn{padding:12px 18px;background:none;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;color:var(--g600);cursor:pointer;font-family:'DM Sans',sans-serif}
.tmsg{font-size:13px;text-align:center;margin-top:12px;color:var(--green)}
.lbox{background:var(--white);border-radius:var(--r);padding:2rem;max-width:360px;width:100%}
.lbox h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.lbox p{font-size:14px;color:var(--g600);margin-bottom:1.5rem}
.pwi{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;background:var(--g100)}
.pwi:focus{border-color:var(--black);background:#fff}
.lbt{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--rx);font-size:14px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer}
.pwe{font-size:13px;color:var(--red);margin-top:6px}
.dots{display:inline-flex;gap:4px}
.mic-banner{background:#fdecea;border:1px solid #f5c6c6;border-radius:10px;padding:12px 16px;margin-bottom:1rem;display:none;align-items:flex-start;gap:10px}
.mic-banner.show{display:flex}
.mic-banner-icon{font-size:18px;flex-shrink:0}
.mic-banner-text{font-size:13px;color:#791F1F;line-height:1.5}
.mic-banner-text strong{display:block;margin-bottom:2px;font-weight:700}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--g400);animation:bn 1.2s infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@media(max-width:500px){.snt{font-size:22px}.mb{width:70px;height:70px;font-size:24px}.card{padding:1.5rem}.profile{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="tov" style="display:none" class="tov"></div>
<div class="hdr">
  <img class="logo" src="https://streetwayenglish.github.io/pronunciation-practice/logo.png" alt="Street Way"/>
  <div class="ttl">Pronunciation Practice</div>
</div>
<div class="main">
  <div class="mic-banner" id="micBanner"><div class="mic-banner-icon">🎤</div><div class="mic-banner-text"><strong>Microphone access needed</strong>Click the 🔒 lock icon in your browser address bar → set Microphone to <em>Allow</em> → refresh the page.</div></div>
  <div class="pb">
    <div class="pt"><div class="pf" id="pf" style="width:0%"></div></div>
    <div class="pl" id="pl">1 / 1</div>
  </div>
  <div id="area"></div>
</div>
<script>
// Force HTTPS
if(location.protocol==='http:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
  location.replace('https://'+location.host+location.pathname+location.search);
}
var W='https://billowing-sunset-c961.lucaswassup.workers.dev';
var SENTS=[
  "She walked to the market yesterday.",
  "He talked to his teacher after class.",
  "They stopped at the traffic light.",
  "She washed the dishes last night.",
  "He missed the bus this morning.",
  "The dog jumped over the fence.",
  "She pushed the door and walked in.",
  "He looked at the map and stopped.",
  "They watched a movie and laughed.",
  "She helped her friend and walked home."
];
var done=JSON.parse(localStorage.getItem('pd')||'{}');
var scores=JSON.parse(localStorage.getItem('ps')||'{}');
var cur=0,mr=null,chunks=[],rec=false,laudio=null,mt='';

function mime(){
  var t=['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg'];
  for(var i=0;i<t.length;i++) if(typeof MediaRecorder!=='undefined'&&MediaRecorder.isTypeSupported(t[i])) return t[i];
  return '';
}
function sbg(s){return s>=85?'cg':s>=75?'co':'cr';}
function spc(s){return s>=85?'pg':s>=75?'po':'prr';}

function prog(){
  var n=Object.keys(done).length;
  document.getElementById('pf').style.width=Math.round(n/SENTS.length*100)+'%';
  document.getElementById('pl').textContent=(cur+1)+' / '+SENTS.length;
}

function render(){
  prog();
  if(cur>=SENTS.length){showEnd();return;}
  var s=SENTS[cur];
  var prevDis=cur===0?' disabled':'';
  var nextDis=cur===SENTS.length-1?' disabled':'';
  document.getElementById('area').innerHTML=
    '<div class="card">'+
      '<div class="cl">Sentence '+(cur+1)+' of '+SENTS.length+'</div>'+
      '<div class="sr"><div class="snt">'+s+'</div>'+
      '<button class="lbtn" id="lbtn" onclick="doSpeak()">&#128266;</button></div>'+
      '<div class="nr">'+
        '<button class="nb" id="pbtn"'+prevDis+'>&#8592; Prev</button>'+
        '<button class="nb" id="nbtn"'+nextDis+'>Next &#8594;</button>'+
      '</div>'+
      '<div class="ms">'+
        '<button class="mb" id="mbtn" onclick="toggleRec()">&#127908;</button>'+
        '<div class="ml" id="mlbl">Tap to start recording</div>'+
        '<div class="trow">'+
          '<div class="tb" id="tbox"><span class="ph">Your spoken words will appear here...</span></div>'+
          '<button class="playbtn" id="playBtn" onclick="togglePlayRec(this)">&#9654;</button>'+
        '</div>'+
      '</div>'+
      '<button class="ab" id="abtn" onclick="doAnalyze()" disabled>Analyze my pronunciation</button>'+
    '</div>'+
    '<div id="fbarea"></div>';
  if(!document.getElementById('pbtn').disabled)
    document.getElementById('pbtn').onclick=function(){goTo(cur-1);};
  if(!document.getElementById('nbtn').disabled)
    document.getElementById('nbtn').onclick=function(){goTo(cur+1);};
}

function doSpeak(){
  var btn=document.getElementById('lbtn');
  if(!btn)return;
  if(laudio){laudio.pause();laudio=null;btn.innerHTML='&#128266;';btn.classList.remove('sp');btn.style.opacity='1';return;}
  btn.innerHTML='&#9203;';btn.style.opacity='0.6';
  fetch(W+'/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:SENTS[cur]})})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.blob();})
    .then(function(b){
      var url=URL.createObjectURL(b);
      laudio=new Audio(url);
      btn.innerHTML='&#9209;';btn.style.opacity='1';btn.classList.add('sp');
      laudio.play();
      laudio.onended=function(){laudio=null;var b2=document.getElementById('lbtn');if(b2){b2.innerHTML='&#128266;';b2.classList.remove('sp');}URL.revokeObjectURL(url);};
    })
    .catch(function(){
      btn.innerHTML='&#128266;';btn.style.opacity='1';btn.classList.remove('sp');
    });
}

function goTo(i){
  if(i<0||i>=SENTS.length)return;
  if(laudio){laudio.pause();laudio=null;}
  if(window._recAudio){window._recAudio.pause();window._recAudio=null;}
  if(window._coachAudio){window._coachAudio.pause();window._coachAudio=null;}
  window._coachText=null;
  if(window._recUrl){URL.revokeObjectURL(window._recUrl);window._recUrl=null;}
  window._ab=null;cur=i;render();
}

function toggleRec(){rec?doStop():doStart();}

function doStart(){
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(function(stream){
      chunks=[];mt=mime();
      mr=new MediaRecorder(stream,mt?{mimeType:mt}:{});
      mr.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
      mr.start(250);rec=true;
      var b=document.getElementById('mbtn'),l=document.getElementById('mlbl');
      if(b){b.classList.add('rec');b.innerHTML='&#9209;';}
      if(l)l.textContent='Recording... tap to stop';
      var t=document.getElementById('tbox');
      if(t)t.innerHTML='<span class="ph">Listening...</span>';
      window._transcript='';
      var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){try{
        window._sr=new SR();
        window._sr.continuous=true;window._sr.interimResults=true;window._sr.lang='en-US';
        window._sr.onresult=function(e){
          var interim='',final='';
          for(var i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal)final+=e.results[i][0].transcript;
            else interim+=e.results[i][0].transcript;
          }
          window._transcript=(window._transcript||'')+final;
          var tb=document.getElementById('tbox');
          if(tb)tb.innerHTML=(window._transcript||'')+(interim?'<em style="color:rgba(255,255,255,0.4)"> '+interim+'</em>':'');
        };
        window._sr.onerror=function(){};
        window._sr.onend=function(){if(rec&&window._sr){try{window._sr.start();}catch(e){}}};
        window._sr.start();
      }catch(e){}}
    })
    .catch(function(e){
      var l=document.getElementById('mlbl');
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
        var b=document.getElementById('micBanner');
        if(b)b.classList.add('show');
        if(l)l.textContent='Microphone blocked — see instructions above.';
      } else if(e.name==='NotFoundError'){
        if(l)l.textContent='No microphone found. Please connect a microphone.';
      } else {
        if(l)l.textContent='Mic error: '+e.message;
      }
    });
}

function doStop(){
  if(!mr)return;rec=false;
  if(window._sr){try{window._sr.onend=null;window._sr.stop();}catch(e){}}
  mr.stop();mr.stream.getTracks().forEach(function(t){t.stop();});
  var b=document.getElementById('mbtn'),l=document.getElementById('mlbl');
  if(b){b.classList.remove('rec');b.innerHTML='&#127908;';}
  if(l)l.textContent='Processing...';
  mr.onstop=function(){
    var m2=mr.mimeType||mt||'audio/webm';
    var blob=new Blob(chunks,{type:m2});
    if(window._recUrl)URL.revokeObjectURL(window._recUrl);
    window._recUrl=URL.createObjectURL(blob);
    var pb=document.getElementById('playBtn');if(pb)pb.classList.add('show');
    var rd=new FileReader();
    rd.onloadend=function(){
      window._ab=rd.result.split(',')[1];window._am=m2;
      var l2=document.getElementById('mlbl');if(l2)l2.textContent='Ready - click Analyze';
      var ab=document.getElementById('abtn');if(ab)ab.disabled=false;
      var tb=document.getElementById('tbox');
      var transcript=window._transcript||'';
      if(tb){
        if(transcript)tb.innerHTML='<span style="color:rgba(255,255,255,0.9);">'+transcript+'</span>';
        else tb.innerHTML='<span style="color:rgba(255,255,255,0.7);font-style:italic;">Audio recorded &#10003;</span>';
      }
    };
    rd.readAsDataURL(blob);
  };
}

function togglePlayRec(btn){
  if(window._recAudio&&!window._recAudio.paused){
    window._recAudio.pause();window._recAudio.currentTime=0;
    btn.innerHTML='&#9654;';btn.classList.remove('playing');return;
  }
  if(window._recUrl){
    window._recAudio=new Audio(window._recUrl);
    btn.innerHTML='&#9646;&#9646;';btn.classList.add('playing');
    window._recAudio.play();
    window._recAudio.onended=function(){btn.innerHTML='&#9654;';btn.classList.remove('playing');};
  }
}

function doAnalyze(){
  if(!window._ab)return;
  var target=SENTS[cur];
  var fb=document.getElementById('fbarea');
  fb.innerHTML='<div class="fbc"><div class="fbt">Analyzing <div class="dots"><span></span><span></span><span></span></div></div></div>';
  done[cur]=true;localStorage.setItem('pd',JSON.stringify(done));prog();
  fetch(W+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:window._ab,target:target,mimeType:window._am||'audio/webm'})})
    .then(function(r){return r.json();})
    .then(function(d){
      var ov=d.overallScore||0;
      var ws=d.wordScores||[];
      var rawText=d.feedback||d.error||'Erro';
      window._coachText=rawText;
      scores[cur]=ov;localStorage.setItem('ps',JSON.stringify(scores));

      // Word pills with syllable highlights
      var pills='';
      for(var wi=0;wi<ws.length;wi++){
        var ww=ws[wi];
        // Build allSyllables - parse from syllableIssues (bad ones) + reconstruct word
        if(!ww.allSyllables){
          var badSyls={};
          if(ww.syllableIssues){
            for(var si2=0;si2<ww.syllableIssues.length;si2++){
              var syl2=ww.syllableIssues[si2];
              var qIdx=syl2.indexOf(' q:');
              if(syl2.charAt(0)==='"'&&qIdx>0){
                var letters=syl2.substring(1,syl2.indexOf('"',1));
                badSyls[letters.toLowerCase()]=true;
              }
            }
          }
          // Try to reconstruct syllables from the word using bad syl letters
          var remaining=ww.word.toLowerCase();
          var syls=[];
          var badKeys=Object.keys(badSyls);
          if(badKeys.length>0){
            // Find each bad syllable in the word
            var wordLower=ww.word.toLowerCase();
            var used=[];
            for(var bk=0;bk<badKeys.length;bk++){
              var idx2=wordLower.indexOf(badKeys[bk]);
              if(idx2>=0) used.push({start:idx2,end:idx2+badKeys[bk].length,bad:true,letters:ww.word.substring(idx2,idx2+badKeys[bk].length)});
            }
            used.sort(function(a,b){return a.start-b.start;});
            var pos=0;
            for(var u=0;u<used.length;u++){
              if(used[u].start>pos) syls.push({letters:ww.word.substring(pos,used[u].start),bad:false});
              syls.push({letters:used[u].letters,bad:true});
              pos=used[u].end;
            }
            if(pos<ww.word.length) syls.push({letters:ww.word.substring(pos),bad:false});
          }
          ww.allSyllables=syls.length>0?syls:[{letters:ww.word,bad:ww.score<75}];
        }
        var tip=ww.phonemeIssues&&ww.phonemeIssues.length?' title="'+ww.phonemeIssues.join(' | ')+'"':'';
        var sylHtml='';
        if(ww.allSyllables&&ww.allSyllables.length){
          sylHtml='<div class="sylrow">';
          for(var si=0;si<ww.allSyllables.length;si++){
            var syl2=ww.allSyllables[si];
            var sylClass=syl2.bad?'syl-bad':'syl-ok';
            sylHtml+='<span class="syl '+sylClass+'">'+syl2.letters+'</span>';
          }
          sylHtml+='</div>';
        }
        pills+='<div class="pill '+spc(ww.score)+'"'+tip+'><span class="pt2">'+ww.word+'</span><span class="ps">'+ww.score+'%</span>'+sylHtml+'</div>';
      }

      // Profile metrics
      var totalWords=ws.length||1;
      var phonemeIssueCount=0,stressIssueCount=0;
      for(var ri=0;ri<ws.length;ri++){
        if(ws[ri].phonemeIssues)phonemeIssueCount+=ws[ri].phonemeIssues.length;
        if(ws[ri].syllableIssues)stressIssueCount+=ws[ri].syllableIssues.length;
      }
      var phonemeScore=Math.max(0,Math.round(100-(phonemeIssueCount/totalWords)*30));
      var stressScore=Math.max(0,Math.round(100-(stressIssueCount/totalWords)*30));
      var intonationScore=Math.round((phonemeScore+stressScore)/2);

      // Coach blocks — split by double newline first, then single newline
      var paragraphs=rawText.split('\n\n').filter(function(p){return p.trim();});
      if(paragraphs.length<2) paragraphs=rawText.split('\n').filter(function(p){return p.trim();});
      if(!paragraphs.length) paragraphs=[rawText];
      var coachHtml='';
      for(var bi=0;bi<paragraphs.length;bi++){
        var icon=bi===0?'💬':bi===paragraphs.length-1?'⭐':'🎯';
        if(bi>0) coachHtml+='<div class="cdiv"></div>';
        var btext=paragraphs[bi].trim();
        // Highlight problem words
        for(var wi2=0;wi2<ws.length;wi2++){
          if(ws[wi2].score<85){
            var wrd=ws[wi2].word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            btext=btext.replace(new RegExp('\\b'+wrd+'\\b','gi'),'<span class="hw">$&</span>');
          }
        }
        coachHtml+='<div class="cblock"><span class="cicon">'+icon+'</span><span class="ctext">'+btext+'</span></div>';
      }

      fb.innerHTML=
        '<div class="fbc">'+
          '<div class="scr">'+
            '<div class="circ '+sbg(ov)+'">'+ov+'%</div>'+
            '<div class="sl"><strong>'+(ov>=85?'Excellent!':ov>=75?'Good effort!':'Keep practicing!')+'</strong><br>Overall pronunciation score</div>'+
          '</div>'+
          (pills?'<div class="hr"></div><div class="fbt">Word Scores</div><div class="wp">'+pills+'</div>':'')+
          '<div class="hr"></div><div class="fbt">Pronunciation Profile</div>'+
          '<div class="profile">'+
            '<div class="pmet"><div class="pmet-icon">🎯</div><div class="pmet-label">Pronúncia</div><div class="pmet-score">'+ov+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(ov>=85?'g':ov>=75?'o':'r')+'" data-w="'+ov+'" style="width:0%"></div></div></div>'+
            '<div class="pmet"><div class="pmet-icon">🔤</div><div class="pmet-label">Fonemas</div><div class="pmet-score">'+phonemeScore+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(phonemeScore>=85?'g':phonemeScore>=75?'o':'r')+'" data-w="'+phonemeScore+'" style="width:0%"></div></div></div>'+
            '<div class="pmet"><div class="pmet-icon">🎵</div><div class="pmet-label">Stress</div><div class="pmet-score">'+stressScore+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(stressScore>=85?'g':stressScore>=75?'o':'r')+'" data-w="'+stressScore+'" style="width:0%"></div></div></div>'+
            '<div class="pmet"><div class="pmet-icon">〰️</div><div class="pmet-label">Entonação</div><div class="pmet-score">'+intonationScore+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(intonationScore>=85?'g':intonationScore>=75?'o':'r')+'" data-w="'+intonationScore+'" style="width:0%"></div></div></div>'+
          '</div>'+
          '<div class="hr"></div>'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'+
            '<div class="fbt" style="margin-bottom:0">Coach de IA</div>'+
            '<button class="coach-audio-btn" id="coachAudioBtn" onclick="speakCoach(this)" title="Ouvir feedback">&#128266;</button>'+
          '</div>'+
          '<div class="coach-wrap">'+coachHtml+'</div>'+
        '</div>';

      setTimeout(function(){
        document.querySelectorAll('[data-w]').forEach(function(el){el.style.width=el.getAttribute('data-w')+'%';});
      },80);
    })
    .catch(function(e){
      fb.innerHTML='<div class="fbc"><div class="ctext" style="color:var(--red)">Error: '+e.message+'</div></div>';
    });
}

function showEnd(){
  var sv=Object.values(scores).map(Number);
  var avg=sv.length?Math.round(sv.reduce(function(a,b){return a+b;},0)/sv.length):0;
  var gr=sv.filter(function(v){return v>=85;}).length;
  var ok=sv.filter(function(v){return v>=75&&v<85;}).length;
  var lo=sv.filter(function(v){return v<75;}).length;
  var best=sv.length?Math.max.apply(null,sv):0;
  document.getElementById('area').innerHTML=
    '<div class="ec"><div class="ei">&#127881;</div>'+
    '<div class="et">Session Complete!</div>'+
    '<div class="es">You practiced all '+SENTS.length+' sentences</div>'+
    '<div class="avg">'+avg+'%</div><div class="avgl">Average Score</div>'+
    '<div class="sg">'+
      '<div class="si"><div class="sn g">'+gr+'</div><div class="sll">Excellent &ge;85%</div></div>'+
      '<div class="si"><div class="sn o">'+ok+'</div><div class="sll">Good 75-84%</div></div>'+
      '<div class="si"><div class="sn rr">'+lo+'</div><div class="sll">Needs work</div></div>'+
      '<div class="si"><div class="sn">'+best+'%</div><div class="sll">Best score</div></div>'+
    '</div>'+
    '<button class="rb" id="rbtn">Practice again</button></div>';
  document.getElementById('rbtn').onclick=function(){
    done={};scores={};localStorage.setItem('pd','{}');localStorage.setItem('ps','{}');cur=0;render();
  };
}

function speakCoach(btn){
  if(window._coachAudio&&!window._coachAudio.paused){
    window._coachAudio.pause();window._coachAudio=null;
    btn.innerHTML='&#128266;';btn.classList.remove('playing','loading');return;
  }
  if(!window._coachText)return;
  btn.innerHTML='&#9203;';btn.classList.add('loading');
  fetch(W+'/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:window._coachText,lang:'pt'})})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.blob();})
    .then(function(b){
      var url=URL.createObjectURL(b);
      window._coachAudio=new Audio(url);
      btn.innerHTML='&#9209;';btn.classList.remove('loading');btn.classList.add('playing');
      window._coachAudio.play();
      window._coachAudio.onended=function(){
        window._coachAudio=null;
        var b2=document.getElementById('coachAudioBtn');
        if(b2){b2.innerHTML='&#128266;';b2.classList.remove('playing');}
        URL.revokeObjectURL(url);
      };
    })
    .catch(function(){
      btn.innerHTML='&#128266;';btn.classList.remove('loading','playing');
    });
}

if(window.location.search.indexOf('teacher')!==-1)showTeacherLogin();
function showTeacherLogin(){
  var o=document.getElementById('tov');o.style.display='flex';
  o.innerHTML='<div class="lbox"><h2>Teacher Panel</h2><p>Enter your password.</p><input type="password" class="pwi" id="pwi" placeholder="Password..."/><button class="lbt" id="lbt">Enter</button><div class="pwe" id="pwe"></div></div>';
  setTimeout(function(){
    var el=document.getElementById('pwi');
    if(el){el.focus();el.onkeydown=function(e){if(e.key==='Enter')doLogin();};}
    document.getElementById('lbt').onclick=doLogin;
  },50);
}
function doLogin(){
  if(document.getElementById('pwi').value==='streetway2024')showTeacherPanel();
  else document.getElementById('pwe').textContent='Wrong password.';
}
function showTeacherPanel(){
  var o=document.getElementById('tov');o.style.display='flex';
  var rows='';
  for(var ti=0;ti<SENTS.length;ti++){
    var sv=SENTS[ti].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    rows+='<div class="trow2"><input class="tinp" value="'+sv+'"/><button class="tdel" onclick="this.parentElement.remove()">x</button></div>';
  }
  o.innerHTML='<div class="tmod"><h2>Edit Sentences</h2><div id="trows">'+rows+'</div><button class="tadd" id="tadd">+ Add sentence</button><div class="tact"><button class="tcn" id="tcn">Cancel</button><button class="tsv" id="tsv">Save and publish</button></div><div class="tmsg" id="tmsg"></div></div>';
  document.getElementById('tadd').onclick=function(){
    var c=document.getElementById('trows'),d=document.createElement('div');d.className='trow2';
    d.innerHTML='<input class="tinp" placeholder="Type new sentence..."/><button class="tdel" onclick="this.parentElement.remove()">x</button>';
    c.appendChild(d);d.querySelector('input').focus();
  };
  document.getElementById('tcn').onclick=closeTeacher;
  document.getElementById('tsv').onclick=saveTeacher;
}
function saveTeacher(){
  var inp=document.querySelectorAll('.tinp'),ns=[];
  for(var si=0;si<inp.length;si++){var v=inp[si].value.trim();if(v)ns.push(v);}
  if(!ns.length){document.getElementById('tmsg').textContent='Add at least one sentence.';return;}
  document.getElementById('tmsg').textContent='Saving...';
  fetch(W+'/sentences',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:'streetway2024',sentences:ns})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){SENTS.length=0;ns.forEach(function(s){SENTS.push(s);});done={};scores={};localStorage.setItem('pd','{}');localStorage.setItem('ps','{}');cur=0;render();document.getElementById('tmsg').textContent='Saved!';setTimeout(closeTeacher,2000);}
      else document.getElementById('tmsg').textContent='Error saving.';
    }).catch(function(e){document.getElementById('tmsg').textContent='Error: '+e.message;});
}
function closeTeacher(){document.getElementById('tov').style.display='none';history.replaceState({},'',window.location.pathname);}

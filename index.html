<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Street Way - Pronunciation</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#fafaf8;--yellow:#f5c842;
  --g100:#f0efeb;--g200:#e0dfd9;--g400:#9e9d97;--g600:#5a5955;
  --green:#2d7a3a;--gl:#e8f5eb;
  --red:#c0392b;--rl:#fdecea;
  --amb:#b7770d;--aml:#fef3e0;
  --r:16px;--rs:10px;--rx:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--black);min-height:100vh}
.hdr{text-align:center;padding:2rem 1rem 1rem}
.logo{height:90px;width:auto;display:block;margin:0 auto 12px}
.ttl{font-size:20px;font-weight:700;color:var(--black)}
.main{max-width:720px;margin:0 auto;padding:1.5rem 1rem 4rem}
.pb{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.pt{flex:1;height:4px;background:var(--g200);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--yellow);border-radius:2px;transition:width .4s}
.pl{font-size:12px;font-weight:700;color:var(--g400);white-space:nowrap}
.card{background:#222222;border-radius:var(--r);padding:2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.card::before{display:none}
.card::after{display:none}
.cl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);margin-bottom:12px}
.sr{display:flex;align-items:flex-start;gap:12px}
.snt{font-size:26px;font-weight:700;color:var(--white);line-height:1.3;margin-bottom:1.5rem;flex:1}
.lbtn{width:44px;height:44px;border-radius:50%;background:var(--yellow);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:transform .15s,opacity .15s;position:relative;z-index:2}
.lbtn:hover{transform:scale(1.08)}
.lbtn.sp{animation:spp .8s infinite alternate}
@keyframes spp{from{box-shadow:0 0 0 0 rgba(245,200,66,.5)}to{box-shadow:0 0 0 10px rgba(245,200,66,0)}}
.nr{display:flex;gap:8px;margin-bottom:1.5rem}
.nb{flex:1;padding:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:var(--rs);font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;font-family:'DM Sans',sans-serif}
.nb:hover{background:rgba(255,255,255,.14);color:#fff}
.nb:disabled{opacity:.25;cursor:not-allowed}
.ms{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1.5rem;background:rgba(255,255,255,.05);border-radius:var(--rs);border:1px solid rgba(255,255,255,.08)}
.mb *,.lbtn *,.playbtn *,.coach-audio-btn *{font-style:normal}
button{-webkit-appearance:none}
.mb{width:80px;height:80px;border-radius:50%;border:none;background:var(--yellow);color:var(--black);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;font-family:'DM Sans',sans-serif}
.mb-icon{width:28px;height:28px;border-radius:50%;background:var(--black);display:block}
.mb:hover{transform:scale(1.06)}
.mb.rec{background:var(--red);color:#fff;animation:rp 1s infinite;font-family:monospace}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.4)}50%{box-shadow:0 0 0 16px rgba(192,57,43,0)}}
.ml{font-size:13px;color:rgba(255,255,255,.5);text-align:center}
.trow{display:flex;align-items:center;gap:8px;width:100%}
.tb{flex:1;min-height:52px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:var(--rx);padding:12px 14px;font-size:15px;color:var(--white);line-height:1.5}
.ph{color:rgba(255,255,255,.3);font-style:italic}
.playbtn{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;display:none}
.playbtn.show{display:flex}
.playbtn.playing{background:var(--yellow);color:var(--black);border-color:var(--yellow)}
.ab{width:100%;padding:14px;margin-top:1rem;background:var(--yellow);color:var(--black);border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.ab:disabled{opacity:.3;cursor:not-allowed}
/* Feedback */
.fbc{background:var(--white);border:2px solid var(--g200);border-radius:var(--r);padding:1.5rem;margin-top:1rem}
.fbt{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g400);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hr{border:none;border-top:1px solid var(--g200);margin:16px 0}
/* Score circle */
.scr{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.circ{display:flex;align-items:center;justify-content:center;width:80px;height:80px;border-radius:50%;font-family:'DM Sans',sans-serif;font-weight:700;flex-shrink:0;font-size:24px;line-height:1;letter-spacing:-0.02em}
.cg{background:var(--gl);color:var(--green)}
.co{background:var(--aml);color:var(--amb)}
.cr{background:var(--rl);color:var(--red)}
.sl{font-size:14px;color:var(--g600);line-height:1.5}
.sl strong{color:var(--black);font-weight:700;font-size:16px}
/* Word pills */
.wp{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;justify-content:center}
.pill{display:inline-flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:8px;cursor:pointer}
.pt2{font-size:16px;font-weight:600;font-family:'Syne',sans-serif}
.ps{font-size:12px;margin-top:2px;opacity:.8}
.pg{background:var(--gl);color:var(--green)}
.po{background:var(--aml);color:var(--amb)}
.prr{background:var(--rl);color:var(--red)}
.syl{display:inline;}
.syl-ok{}
.syl-bad{border-bottom:2px solid var(--red);}
/* Profile cards */
.profile{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.pmet{background:var(--g100);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.pmet-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);margin-bottom:6px}
.pmet-score{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:var(--black);line-height:1}
.pmet-bar{height:4px;background:var(--g200);border-radius:2px;margin-top:8px;overflow:hidden}
.pmet-fill{height:100%;border-radius:2px;width:0%;transition:width .6s cubic-bezier(.4,0,.2,1)}
.pmet-fill-g{background:linear-gradient(90deg,#2d7a3a,#4caf50)}
.pmet-fill-o{background:linear-gradient(90deg,#b7770d,#f5a623)}
.pmet-fill-r{background:linear-gradient(90deg,#c0392b,#e74c3c)}
.pmet-icon{position:absolute;top:10px;right:12px;font-size:16px;opacity:.4}
/* Coach */
.coach-wrap{background:#fffef7;border:1px solid #e8e4c8;border-radius:12px;padding:1.25rem}
.cblock{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.cblock:last-child{margin-bottom:0}
.cicon{font-size:15px;flex-shrink:0;margin-top:2px}
.ctext{font-size:15px;line-height:1.75;color:var(--black)}
.ctext .hw{background:#fdecea;color:#791F1F;padding:1px 5px;border-radius:4px;font-weight:600}
.cdiv{border:none;border-top:1px solid #e8e4c8;margin:12px 0}
.coach-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.coach-audio-btn{width:32px;height:32px;border-radius:50%;background:var(--yellow);color:var(--black);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:transform .15s,opacity .15s;flex-shrink:0}
.coach-audio-btn:hover{transform:scale(1.08)}
.coach-audio-btn.loading{opacity:.6;cursor:wait}
.coach-audio-btn.playing{animation:spp .8s infinite alternate}
/* Completion */
.ec{background:var(--black);border-radius:var(--r);padding:2.5rem 2rem;text-align:center}
.ei{font-size:44px;margin-bottom:1rem;line-height:1}
.et{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:var(--yellow);margin-bottom:6px;letter-spacing:-0.01em}
.es{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:2rem;font-family:'DM Sans',sans-serif;font-weight:400}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.si{background:rgba(255,255,255,.06);border-radius:var(--rs);padding:12px;text-align:center}
.sn{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:600;color:var(--white);letter-spacing:-0.01em}
.sn.g{color:#4caf50}.sn.o{color:var(--yellow)}.sn.rr{color:var(--red)}
.sll{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;font-family:'DM Sans',sans-serif}
.avg{display:inline-block;background:var(--yellow);color:var(--black);font-family:'Plus Jakarta Sans',sans-serif;font-size:32px;font-weight:700;padding:14px 32px;border-radius:var(--rs);margin-bottom:1.5rem;letter-spacing:-0.02em}
.avgl{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:1.5rem;text-transform:uppercase;letter-spacing:.08em}
.rb{padding:12px 28px;background:var(--white);color:var(--black);border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer}
/* Teacher */
.tov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.tmod{background:var(--white);border-radius:var(--r);padding:2rem;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.tmod h2{font-size:20px;font-weight:700;margin-bottom:1.5rem}
.trow2{display:flex;gap:8px;margin-bottom:8px}
.tinp{flex:1;padding:10px 12px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:var(--g100)}
.tinp:focus{border-color:var(--black);background:#fff}
.tdel{background:none;border:1.5px solid var(--g200);border-radius:var(--rx);padding:6px 10px;font-size:13px;cursor:pointer;color:var(--g400)}
.tdel:hover{background:var(--rl);color:var(--red);border-color:var(--red)}
.tadd{width:100%;padding:10px;background:none;border:1.5px dashed var(--g200);border-radius:var(--rx);font-size:13px;color:var(--g400);cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:1.5rem}
.tact{display:flex;gap:8px}
.tsv{flex:1;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--rx);font-size:14px;font-weight:600;cursor:pointer}
.tcn{padding:12px 18px;background:none;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;color:var(--g600);cursor:pointer;font-family:'DM Sans',sans-serif}
.tmsg{font-size:13px;text-align:center;margin-top:12px;color:var(--green)}
.ttabs{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:2px solid var(--g200)}
.ttab{padding:10px 20px;background:none;border:none;font-size:13px;font-weight:700;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.ttab.active{color:var(--black);border-bottom-color:var(--black)}
.mc-row{background:var(--g100);border-radius:10px;padding:14px;margin-bottom:10px}
.mc-q{width:100%;padding:9px 12px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;margin-bottom:8px}
.mc-q:focus{border-color:var(--black)}
.mc-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.mc-opt-row{display:flex;gap:6px;align-items:center}
.mc-opt-radio{width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:var(--black)}
.mc-opt-inp{flex:1;padding:8px 10px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fff}
.mc-opt-inp:focus{border-color:var(--black)}
.mc-target-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.mc-target-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g400);white-space:nowrap}
.mc-del{background:none;border:1.5px solid var(--g200);border-radius:var(--rx);padding:5px 10px;font-size:12px;cursor:pointer;color:var(--g400);margin-left:auto}
.mc-del:hover{background:var(--rl);color:var(--red);border-color:var(--red)}
.ai-gen-box{background:var(--g100);border-radius:10px;padding:14px;margin-bottom:1rem}
.ai-gen-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);margin-bottom:8px}
.ai-gen-inp{width:100%;padding:10px 12px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;min-height:80px;resize:vertical}
.ai-gen-inp:focus{border-color:var(--black)}
.ai-gen-btn{width:100%;margin-top:8px;padding:11px;background:var(--black);color:#fff;border:none;border-radius:var(--rx);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.ai-gen-btn:hover{opacity:.85}
.ai-gen-btn:disabled{opacity:.4;cursor:wait}
.ai-gen-status{font-size:13px;color:var(--g400);margin-top:8px;text-align:center}
/* Emma Avatar - Frosted Glass */
.emma-card{position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:1rem;display:flex;flex-direction:column;min-height:520px;}

@keyframes emmaBreathe{0%,100%{box-shadow:0 0 0 0 rgba(245,200,66,.5)}50%{box-shadow:0 0 0 12px rgba(245,200,66,0)}}
.emma-name{font-size:20px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);}
.emma-role{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px;}
.emma-live{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(76,175,80,.2);border:1px solid rgba(76,175,80,.4);border-radius:20px;padding:4px 10px;}
.emma-live-dot{width:5px;height:5px;border-radius:50%;background:#4caf50;animation:rp 2s infinite;}
.emma-live-txt{font-size:10px;color:#4caf50;font-weight:600;letter-spacing:.05em;}
.emma-bubble-wrap{flex:1;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:280px;}
.emma-bubble{padding:12px 16px;font-size:14px;line-height:1.6;max-width:82%;}
.emma-bubble.emma{background:rgba(30,30,30,.75);border:1px solid rgba(255,255,255,.12);border-radius:4px 16px 16px 16px;color:rgba(255,255,255,.95);}
.emma-bubble.student{background:rgba(180,140,0,.5);border:1px solid rgba(245,200,66,.4);border-radius:16px 4px 16px 16px;color:#fff;align-self:flex-end;}
.emma-footer{padding:12px 16px 20px;background:rgba(0,0,0,.35);border-top:1px solid rgba(255,255,255,.08);}
.emma-status{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:10px;min-height:18px;}
.emma-controls{display:flex;gap:8px;}
.emma-mic{flex:1;padding:14px;background:var(--yellow);color:var(--black);border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;}
.emma-mic.rec{background:var(--red);color:#fff;}
.emma-end{padding:14px 16px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.1);border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;}
/* AI Generator */
.ai-gen-box{background:var(--g100);border-radius:10px;padding:14px;margin-bottom:1.5rem;border:1.5px dashed var(--g200)}
.ai-gen-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);margin-bottom:8px}
.ai-gen-inp{width:100%;padding:10px 12px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;min-height:80px;resize:vertical;margin-bottom:8px}
.ai-gen-inp:focus{border-color:var(--black)}
.ai-gen-btn{width:100%;padding:11px;background:var(--black);color:var(--white);border:none;border-radius:var(--rx);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.ai-gen-btn:disabled{opacity:.4;cursor:not-allowed}
.ai-gen-status{font-size:12px;color:var(--g400);margin-top:6px;text-align:center;min-height:18px}
.lbox{background:var(--white);border-radius:var(--r);padding:2rem;max-width:360px;width:100%}
.lbox h2{font-size:20px;font-weight:700;margin-bottom:6px}
.lbox p{font-size:14px;color:var(--g600);margin-bottom:1.5rem}
.pwi{width:100%;padding:12px 14px;border:1.5px solid var(--g200);border-radius:var(--rx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;background:var(--g100)}
.pwi:focus{border-color:var(--black);background:#fff}
.lbt{width:100%;padding:12px;background:var(--black);color:var(--white);border:none;border-radius:var(--rx);font-size:14px;font-weight:600;cursor:pointer}
.pwe{font-size:13px;color:var(--red);margin-top:6px}
.dots{display:inline-flex;gap:4px}
/* Word popup */
.wpop{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;background:rgba(0,0,0,.5);padding:1rem}
.wpop.show{display:flex}
.wpop-box{background:#fff;border-radius:16px;padding:1.5rem;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.wpop-word{font-family:'DM Sans',sans-serif;font-size:20px;font-weight:700;color:var(--black);margin-bottom:4px;letter-spacing:-0.01em}
.wpop-score{font-size:13px;color:var(--g400);margin-bottom:1rem}
.wpop-btns{display:flex;gap:8px;margin-bottom:1.25rem}
.wpop-btn{flex:1;padding:10px 8px;border-radius:10px;border:1.5px solid var(--g200);background:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--g600);display:flex;flex-direction:column;align-items:center;gap:4px;transition:background .15s}
.wpop-btn:hover{background:var(--g100)}
.wpop-btn.active{background:var(--yellow);border-color:var(--yellow);color:var(--black)}
.wpop-btn.loading{opacity:.6;pointer-events:none}
.wpop-btn-icon{font-size:18px;transition:transform .3s}
.wpop-btn.active .wpop-btn-icon{animation:pulse .6s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.25)}}
.wpop-table{width:100%;border-collapse:collapse;font-size:13px}
.wpop-table th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g400);padding:0 0 8px;border-bottom:1px solid var(--g200)}
.wpop-table td{padding:7px 0;border-bottom:1px solid var(--g100);color:var(--black);vertical-align:middle}
.wpop-table td:last-child{text-align:right}
.wpop-good{color:var(--green);font-weight:600}
.wpop-bad{color:var(--red);font-weight:600}
.wpop-close{width:100%;margin-top:1.25rem;padding:10px;background:var(--black);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
/* MC Exercise */
.mode-tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin-bottom:1.5rem}
.mode-tab{padding:10px 20px;background:none;border:none;font-size:13px;font-weight:700;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.mode-tab.active{color:var(--black);border-bottom-color:var(--yellow)}
.mc-card{background:#222222;border-radius:var(--r);padding:2rem;margin-bottom:1rem;position:relative;overflow:hidden}
.mc-card::before{display:none}
.mc-card::after{display:none}
.mc-qnum{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--yellow);margin-bottom:12px}
.mc-question{font-size:22px;font-weight:700;color:var(--white);line-height:1.3;margin-bottom:1.5rem}
.mc-listen-btn{width:44px;height:44px;border-radius:50%;background:var(--yellow);color:var(--black);border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;transition:transform .15s;position:relative;z-index:2}
.mc-listen-btn:hover{transform:scale(1.08)}
.mc-options{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.mc-opt{padding:14px 16px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:var(--rs);font-size:15px;color:var(--white);cursor:pointer;font-family:'DM Sans',sans-serif;text-align:left;transition:background .15s;position:relative;z-index:2}
.mc-opt:hover{background:rgba(255,255,255,.15)}
.mc-opt.selected{border-color:var(--yellow);background:rgba(245,200,66,.15)}
.mc-opt.correct{border-color:var(--green);background:rgba(45,122,58,.2);color:#a8d5b0}
.mc-opt.wrong{border-color:var(--red);background:rgba(192,57,43,.2);color:#f5a0a0}
.mc-result{margin-top:1rem;padding:1rem;border-radius:var(--rs);font-size:15px;line-height:1.6}
.mc-result.correct-r{background:var(--gl);color:var(--green)}
.mc-result.wrong-r{background:var(--rl);color:var(--red)}
.mc-next-btn{width:100%;padding:14px;background:var(--yellow);color:var(--black);border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;margin-top:1rem;display:none}
.mc-check-btn{width:100%;padding:14px;background:var(--yellow);color:var(--black);border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;margin-top:1rem;display:none}
.mc-skip-btn{padding:14px 18px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1.5px solid rgba(255,255,255,.15);border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.mc-skip-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.mc-analyzing{text-align:center;padding:12px;color:var(--g400);font-size:14px;display:none}
.mic-banner{background:#fdecea;border:1px solid #f5c6c6;border-radius:10px;padding:12px 16px;margin-bottom:1rem;display:none;align-items:flex-start;gap:10px}
.mic-banner.show{display:flex}
.mic-banner-icon{font-size:18px;flex-shrink:0}
.mic-banner-text{font-size:13px;color:#791F1F;line-height:1.5}
.mic-banner-text strong{display:block;margin-bottom:2px;font-weight:700}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--g400);animation:bn 1.2s infinite;display:inline-block}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@media(max-width:500px){.snt{font-size:22px}.mb{width:70px;height:70px;font-size:24px}.card{padding:1.5rem}.profile{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="tov" style="display:none" class="tov"></div>
<div class="hdr">
  <img class="logo" src="https://streetwayenglish.github.io/pronunciation-practice/logo.png" alt="Street Way"/>
  <div class="ttl">Pronunciation Practice</div>
</div>
<div class="main">
  <div class="mic-banner" id="micBanner"><div class="mic-banner-icon">🎤</div><div class="mic-banner-text"><strong>Microphone access needed</strong>Click the 🔒 lock icon in your browser address bar → set Microphone to <em>Allow</em> → refresh the page.</div></div>
  <div class="pb">
    <div class="pt"><div class="pf" id="pf" style="width:0%"></div></div>
    <div class="pl" id="pl">1 / 1</div>
  </div>
  <div id="area"></div>
</div>
<script>
// Force HTTPS
if(location.protocol==='http:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
  location.replace('https://'+location.host+location.pathname+location.search);
}
var W='https://billowing-sunset-c961.lucaswassup.workers.dev';
var SENTS=[
  "She walked to the market yesterday.",
  "He talked to his teacher after class.",
  "They stopped at the traffic light.",
  "She washed the dishes last night.",
  "He missed the bus this morning.",
  "The dog jumped over the fence.",
  "She pushed the door and walked in.",
  "He looked at the map and stopped.",
  "They watched a movie and laughed.",
  "She helped her friend and walked home."
];
var done=JSON.parse(localStorage.getItem('pd')||'{}');
var appMode='sentences';var mcCur=0;var mcAudio=null;var mcScores=[];
var emmaHistory=[];var emmaAudio=null;var emmaRec=false;var emmaMr=null;var emmaChunks=[];var emmaTopic='';
var scores=JSON.parse(localStorage.getItem('ps')||'{}');
var cur=0,mr=null,chunks=[],rec=false,laudio=null,mt='';

function mime(){
  var t=['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg'];
  for(var i=0;i<t.length;i++) if(typeof MediaRecorder!=='undefined'&&MediaRecorder.isTypeSupported(t[i])) return t[i];
  return '';
}
function sbg(s){return s>=85?'cg':s>=75?'co':'cr';}
function spc(s){return s>=85?'pg':s>=75?'po':'prr';}

function prog(){
  var n=Object.keys(done).length;
  document.getElementById('pf').style.width=Math.round(n/SENTS.length*100)+'%';
  document.getElementById('pl').textContent=(cur+1)+' / '+SENTS.length;
}

function renderModeTabs(){
  var s1=appMode==='sentences'?' active':'';
  var s2=appMode==='mc'?' active':'';
  var s3=appMode==='emma'?' active':'';
  return '<div class="mode-tabs">'+
    '<button class="mode-tab'+s1+'" onclick="switchMode(&quot;sentences&quot;)">Pronunciation</button>'+
    '<button class="mode-tab'+s2+'" onclick="switchMode(&quot;mc&quot;)">Speaking</button>'+
    '<button class="mode-tab'+s3+'" onclick="switchMode(&quot;emma&quot;)">Conversation</button>'+
  '</div>';
}
function switchMode(m){
  appMode=m;
  if(m==='sentences') render();
  else if(m==='mc') renderMC();
  else renderEmma();
}
function render(){
  prog();
  if(cur>=SENTS.length){showEnd();return;}
  var s=SENTS[cur];
  var prevDis=cur===0?' disabled':'';
  var nextDis=cur===SENTS.length-1?' disabled':'';
  document.getElementById('area').innerHTML=
    renderModeTabs()+
    '<div class="card">'+
      '<div class="cl">Sentence '+(cur+1)+' of '+SENTS.length+'</div>'+
      '<div class="sr"><div class="snt">'+s+'</div>'+
      '<button class="lbtn" id="lbtn" onclick="doSpeak()">&#128266;</button></div>'+
      '<div class="nr">'+
        '<button class="nb" id="pbtn"'+prevDis+'>&#8592; Prev</button>'+
        '<button class="nb" id="nbtn"'+nextDis+'>Next &#8594;</button>'+
      '</div>'+
      '<div class="ms">'+
        '<button class="mb" id="mbtn" onclick="toggleRec()">&#127908;</button>'+
        '<div class="ml" id="mlbl">Tap to start recording</div>'+
        '<div class="trow">'+
          '<div class="tb" id="tbox"><span class="ph">Your spoken words will appear here...</span></div>'+
          '<button class="playbtn" id="playBtn" onclick="togglePlayRec(this)">&#9654;</button>'+
        '</div>'+
      '</div>'+
      '<button class="ab" id="abtn" onclick="doAnalyze()" disabled>Analyze my pronunciation</button>'+
    '</div>'+
    '<div id="fbarea"></div>';
  if(!document.getElementById('pbtn').disabled)
    document.getElementById('pbtn').onclick=function(){goTo(cur-1);};
  if(!document.getElementById('nbtn').disabled)
    document.getElementById('nbtn').onclick=function(){goTo(cur+1);};
}

function doSpeak(){
  var btn=document.getElementById('lbtn');
  if(!btn)return;
  if(laudio){laudio.pause();laudio=null;btn.innerHTML='&#128266;';btn.classList.remove('sp');btn.style.opacity='1';return;}
  btn.innerHTML='&#9203;&#65038;';btn.style.opacity='0.6';
  fetch(W+'/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:SENTS[cur]})})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.blob();})
    .then(function(b){
      var url=URL.createObjectURL(b);
      laudio=new Audio(url);
      btn.innerHTML='&#9209;&#65038;';btn.style.opacity='1';btn.classList.add('sp');
      laudio.play();
      laudio.onended=function(){laudio=null;var b2=document.getElementById('lbtn');if(b2){b2.innerHTML='&#128266;';b2.classList.remove('sp');}URL.revokeObjectURL(url);};
    })
    .catch(function(){
      btn.innerHTML='&#128266;';btn.style.opacity='1';btn.classList.remove('sp');
    });
}

function goTo(i){
  if(i<0||i>=SENTS.length)return;
  if(laudio){laudio.pause();laudio=null;}
  if(window._recAudio){window._recAudio.pause();window._recAudio=null;}
  if(window._coachAudio){window._coachAudio.pause();window._coachAudio=null;}
  if(window._coachAudioUrl){URL.revokeObjectURL(window._coachAudioUrl);window._coachAudioUrl=null;}
  window._coachText=null;
  if(window._recUrl){URL.revokeObjectURL(window._recUrl);window._recUrl=null;}
  window._ab=null;cur=i;render();
}

function toggleRec(){rec?doStop():doStart();}

function doStart(){
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(function(stream){
      chunks=[];mt=mime();
      mr=new MediaRecorder(stream,mt?{mimeType:mt}:{});
      mr.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
      mr.start(250);rec=true;
      var b=document.getElementById('mbtn'),l=document.getElementById('mlbl');
      if(b){b.classList.add('rec');b.innerHTML='&#9209;&#65038;';}
      if(l)l.textContent='Recording... tap to stop';
      var t=document.getElementById('tbox');
      if(t)t.innerHTML='<span class="ph">Listening...</span>';
      window._transcript='';
      var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){try{
        window._sr=new SR();
        window._sr.continuous=true;window._sr.interimResults=true;window._sr.lang='en-US';
        window._sr.onresult=function(e){
          var interim='',final='';
          for(var i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal)final+=e.results[i][0].transcript;
            else interim+=e.results[i][0].transcript;
          }
          window._transcript=(window._transcript||'')+final;
          var tb=document.getElementById('tbox');
          if(tb)tb.innerHTML=(window._transcript||'')+(interim?'<em style="color:rgba(255,255,255,0.4)"> '+interim+'</em>':'');
        };
        window._sr.onerror=function(){};
        window._sr.onend=function(){if(rec&&window._sr){try{window._sr.start();}catch(e){}}};
        window._sr.start();
      }catch(e){}}
    })
    .catch(function(e){
      var l=document.getElementById('mlbl');
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
        var b=document.getElementById('micBanner');
        if(b)b.classList.add('show');
        if(l)l.textContent='Microphone blocked — see instructions above.';
      } else if(e.name==='NotFoundError'){
        if(l)l.textContent='No microphone found. Please connect a microphone.';
      } else {
        if(l)l.textContent='Mic error: '+e.message;
      }
    });
}

function doStop(){
  if(!mr)return;rec=false;
  if(window._sr){try{window._sr.onend=null;window._sr.stop();}catch(e){}}
  mr.stop();mr.stream.getTracks().forEach(function(t){t.stop();});
  var b=document.getElementById('mbtn'),l=document.getElementById('mlbl');
  if(b){b.classList.remove('rec');b.innerHTML='&#127908;';}
  if(l)l.textContent='Processing...';
  mr.onstop=function(){
    var m2=mr.mimeType||mt||'audio/webm';
    var blob=new Blob(chunks,{type:m2});
    if(window._recUrl)URL.revokeObjectURL(window._recUrl);
    window._recUrl=URL.createObjectURL(blob);
    var pb=document.getElementById('playBtn');if(pb)pb.classList.add('show');
    var rd=new FileReader();
    rd.onloadend=function(){
      window._ab=rd.result.split(',')[1];window._am=m2;
      var l2=document.getElementById('mlbl');if(l2)l2.textContent='Ready - click Analyze';
      var ab=document.getElementById('abtn');if(ab)ab.disabled=false;
      var tb=document.getElementById('tbox');
      var transcript=window._transcript||'';
      if(tb){
        if(transcript)tb.innerHTML='<span style="color:rgba(255,255,255,0.9);">'+transcript+'</span>';
        else tb.innerHTML='<span style="color:rgba(255,255,255,0.7);font-style:italic;">Audio recorded &#10003;</span>';
      }
    };
    rd.readAsDataURL(blob);
  };
}

function togglePlayRec(btn){
  if(window._recAudio&&!window._recAudio.paused){
    window._recAudio.pause();window._recAudio.currentTime=0;
    btn.innerHTML='&#9654;';btn.classList.remove('playing');return;
  }
  if(window._recUrl){
    window._recAudio=new Audio(window._recUrl);
    btn.innerHTML='&#9209;&#65038;';btn.classList.add('playing');
    window._recAudio.play();
    window._recAudio.onended=function(){btn.innerHTML='&#9654;';btn.classList.remove('playing');};
  }
}

function doAnalyze(){
  if(!window._ab)return;
  var target=SENTS[cur];
  var fb=document.getElementById('fbarea');
  fb.innerHTML='<div class="fbc"><div class="fbt">Analyzing <div class="dots"><span></span><span></span><span></span></div></div></div>';
  done[cur]=true;localStorage.setItem('pd',JSON.stringify(done));prog();
  fetch(W+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:window._ab,target:target,mimeType:window._am||'audio/webm'})})
    .then(function(r){return r.json();})
    .then(function(d){
      var ov=d.overallScore||0;
      var ws=d.wordScores||[];
      var rawText=d.feedback||d.error||'Erro';
      window._coachText=rawText;
      scores[cur]=ov;localStorage.setItem('ps',JSON.stringify(scores));

      // Word pills with syllable highlights
      var pills='';
      for(var wi=0;wi<ws.length;wi++){
        var ww=ws[wi];
        var tip=ww.phonemeIssues&&ww.phonemeIssues.length?' title="'+ww.phonemeIssues.join(' | ')+'"':'';
        // Build inline word HTML with bad syllables underlined
        var wordHtml=ww.word;
        if(ww.allSyllables&&ww.allSyllables.length>0){
          var hasBad=false;
          for(var sx=0;sx<ww.allSyllables.length;sx++){if(ww.allSyllables[sx].bad)hasBad=true;}
          if(hasBad){
            wordHtml='';
            for(var si=0;si<ww.allSyllables.length;si++){
              var s2=ww.allSyllables[si];
              wordHtml+='<span class="'+(s2.bad?'syl-bad':'syl-ok')+'">'+s2.letters+'</span>';
            }
          }
        }
        var wdata=encodeURIComponent(JSON.stringify({word:ww.word,score:ww.score,phonemes:ww.phonemeIssues||[],allPhones:ww.allPhones||[],start:ww.start||0,end:ww.end||0}));
        pills+='<div class="pill '+spc(ww.score)+'" onclick="openWordPopup(this)" data-w="'+wdata+'" style="cursor:pointer"><span class="pt2">'+wordHtml+'</span><span class="ps">'+ww.score+'%</span></div>';
      }

      // Profile metrics
      var totalWords=ws.length||1;
      var phonemeIssueCount=0,stressIssueCount=0;
      for(var ri=0;ri<ws.length;ri++){
        if(ws[ri].phonemeIssues)phonemeIssueCount+=ws[ri].phonemeIssues.length;
        if(ws[ri].syllableIssues)stressIssueCount+=ws[ri].syllableIssues.length;
      }
      var phonemeScore=Math.max(0,Math.round(100-(phonemeIssueCount/totalWords)*30));
      var stressScore=Math.max(0,Math.round(100-(stressIssueCount/totalWords)*30));
      var intonationScore=Math.round((phonemeScore+stressScore)/2);

      // Coach blocks — split by double newline first, then single newline
      var paragraphs=rawText.split('\n\n').filter(function(p){return p.trim();});
      if(paragraphs.length<2) paragraphs=rawText.split('\n').filter(function(p){return p.trim();});
      if(!paragraphs.length) paragraphs=[rawText];
      var coachHtml='';
      for(var bi=0;bi<paragraphs.length;bi++){
        var icon=bi===0?'💬':bi===paragraphs.length-1?'⭐':'🎯';
        if(bi>0) coachHtml+='<div class="cdiv"></div>';
        var btext=paragraphs[bi].trim();
        // Highlight problem words
        for(var wi2=0;wi2<ws.length;wi2++){
          if(ws[wi2].score<85){
            var wrd=ws[wi2].word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
            btext=btext.replace(new RegExp('\\b'+wrd+'\\b','gi'),'<span class="hw">$&</span>');
          }
        }
        coachHtml+='<div class="cblock"><span class="cicon">'+icon+'</span><span class="ctext">'+btext+'</span></div>';
      }

      fb.innerHTML=
        '<div class="fbc">'+
          '<div class="scr">'+
            '<div class="circ '+sbg(ov)+'">'+ov+'%</div>'+
            '<div class="sl"><strong>'+(ov>=85?'Excellent!':ov>=75?'Good effort!':'Keep practicing!')+'</strong><br>Overall pronunciation score</div>'+
          '</div>'+
          (pills?'<div class="hr"></div><div class="fbt">Word Scores</div><div class="wp">'+pills+'</div>':'')+
          '<div class="hr"></div><div class="fbt">Pronunciation Profile</div>'+
          '<div class="profile">'+
            '<div class="pmet"><div class="pmet-icon">🎯</div><div class="pmet-label">Pronúncia</div><div class="pmet-score">'+ov+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(ov>=85?'g':ov>=75?'o':'r')+'" data-w="'+ov+'" style="width:0%"></div></div></div>'+
            '<div class="pmet"><div class="pmet-icon">🔤</div><div class="pmet-label">Fonemas</div><div class="pmet-score">'+phonemeScore+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(phonemeScore>=85?'g':phonemeScore>=75?'o':'r')+'" data-w="'+phonemeScore+'" style="width:0%"></div></div></div>'+
            '<div class="pmet"><div class="pmet-icon">🎵</div><div class="pmet-label">Stress</div><div class="pmet-score">'+stressScore+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(stressScore>=85?'g':stressScore>=75?'o':'r')+'" data-w="'+stressScore+'" style="width:0%"></div></div></div>'+
            '<div class="pmet"><div class="pmet-icon">〰️</div><div class="pmet-label">Entonação</div><div class="pmet-score">'+intonationScore+'<span style="font-size:13px;opacity:.5">%</span></div><div class="pmet-bar"><div class="pmet-fill pmet-fill-'+(intonationScore>=85?'g':intonationScore>=75?'o':'r')+'" data-w="'+intonationScore+'" style="width:0%"></div></div></div>'+
          '</div>'+
          '<div class="hr"></div>'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">'+
            '<div class="fbt" style="margin-bottom:0">Coach de IA</div>'+
            '<button class="coach-audio-btn" id="coachAudioBtn" onclick="speakCoach(this)" title="Ouvir feedback">&#128266;</button>'+
          '</div>'+
          '<div class="coach-wrap">'+coachHtml+'</div>'+
        '</div>';

      setTimeout(function(){
        document.querySelectorAll('[data-w]').forEach(function(el){el.style.width=el.getAttribute('data-w')+'%';});
      },80);
    })
    .catch(function(e){
      fb.innerHTML='<div class="fbc"><div class="ctext" style="color:var(--red)">Error: '+e.message+'</div></div>';
    });
}

function renderMC(){
  // Update progress bar for MC mode
  var pf=document.getElementById('pf');
  var pl=document.getElementById('pl');
  if(pf)pf.style.width=MCQS.length?Math.round((mcCur/MCQS.length)*100)+'%':'0%';
  if(pl)pl.textContent=(mcCur+1)+' / '+(MCQS.length||0);
  var area=document.getElementById('area');
  if(!MCQS||MCQS.length===0){
    area.innerHTML=renderModeTabs()+'<div class="fbc" style="text-align:center;padding:2rem"><p style="color:var(--g400);font-size:15px">No speaking exercises yet. Check back soon!</p></div>';
    return;
  }
  if(mcCur>=MCQS.length){
    var pf2=document.getElementById('pf');
    var pl2=document.getElementById('pl');
    if(pf2)pf2.style.width='100%';
    if(pl2)pl2.textContent=MCQS.length+' / '+MCQS.length;

var mcRec=false,mcMr=null,mcChunks=[];

function mcStartRec(){
  navigator.mediaDevices.getUserMedia({audio:true})
    .then(function(stream){
      mcChunks=[];var mt2=mime();
      mcMr=new MediaRecorder(stream,mt2?{mimeType:mt2}:{});

      mcMr.start(250);mcRec=true;

      window._transcript='';

      if(SR){try{
        window._sr=new SR();window._sr.continuous=true;window._sr.interimResults=true;window._sr.lang='en-US';
        window._sr.onresult=function(e){
          var interim='',final='';
          for(var i=e.resultIndex;i<e.results.length;i++){
            if(e.results[i].isFinal)final+=e.results[i][0].transcript;

          }
          window._transcript=(window._transcript||'')+final;
          var tb=document.getElementById('mcTbox');
          if(tb)tb.innerHTML=(window._transcript||'')+(interim?'<em style="color:rgba(255,255,255,0.4)"> '+interim+'</em>':'');
        };

        window._sr.onend=function(){if(mcRec&&window._sr){try{window._sr.start();}catch(e){}}};
        window._sr.start();
      }catch(e){}}
    }).catch(function(e){var l=document.getElementById('mcMicLbl');if(l)l.textContent='Mic error: '+e.message;});
}
function mcStopRec(){
  if(!mcMr)return;mcRec=false;
  if(window._sr){try{window._sr.onend=null;window._sr.stop();}catch(e){}}
  mcMr.stop();mcMr.stream.getTracks().forEach(function(t){t.stop();});
  var b=document.getElementById('mcMicBtn'),l=document.getElementById('mcMicLbl');
  if(b){b.classList.remove('rec');b.innerHTML='&#127908;';}
  if(l)l.textContent='Processing...';
  mcMr.onstop=function(){
    var m2=mcMr.mimeType||'audio/webm';
    var blob=new Blob(mcChunks,{type:m2});
    if(window._recUrl)URL.revokeObjectURL(window._recUrl);
    window._recUrl=URL.createObjectURL(blob);
    var pb=document.getElementById('mcPlayBtn');if(pb)pb.classList.add('show');

function checkMCAnswer(transcript){
  var q=MCQS[mcCur];
  var correctOpt=q.options[q.correct]||'';
  var said=transcript.toLowerCase().trim();
  // Check if any option was said
  var matchedIdx=-1;
  var bestScore=0;
  for(var i=0;i<q.options.length;i++){
    if(!q.options[i])continue;
    var opt=q.options[i].toLowerCase();
    // Check overlap — count matching words
    var optWords=opt.split(' ');
    var matches=0;
    for(var w=0;w<optWords.length;w++){if(said.indexOf(optWords[w])>=0)matches++;}
    var score=matches/optWords.length;
    if(score>bestScore){bestScore=score;matchedIdx=i;}
  }
  // Also check if transcript directly contains key words from correct option
  var correctOpt2=(q.options[q.correct]||'').toLowerCase();
  var correctWords=correctOpt2.split(' ').filter(function(w){return w.length>2;});
  var directMatches=0;
  for(var cw=0;cw<correctWords.length;cw++){if(said.indexOf(correctWords[cw])>=0)directMatches++;}
  var directScore=correctWords.length>0?directMatches/correctWords.length:0;
  var isCorrect=(matchedIdx===q.correct&&bestScore>0.3)||(directScore>=0.5);
  // Highlight options
  var opts=document.querySelectorAll('.mc-opt');
  for(var i=0;i<opts.length;i++){
    if(i===q.correct)opts[i].classList.add('correct');
    else if(i===matchedIdx&&!isCorrect)opts[i].classList.add('wrong');
  }
  var result=document.getElementById('mcResult');
  var nextBtn=document.getElementById('mcNextBtn');
  if(!transcript){
    result.className='mc-result wrong-r';
    result.innerHTML='We could not detect your answer. Please try recording again — speak clearly and close to the mic.';
    var cb2=document.getElementById('mcCheckBtn');if(cb2)cb2.style.display='none';
    return;
  }
  if(isCorrect){
    mcScores.push(1);
    result.className='';
    result.style='';
    result.innerHTML=
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);">'+
        '<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke="#6fcf6f" stroke-width="1.5"/><path d="M7 11l3 3 5-5" stroke="#6fcf6f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
        '<span style="font-size:18px;font-weight:700;color:#6fcf6f;font-family:Syne,sans-serif;">Correct!</span>'+
      '</div>'+
      '<div style="padding:14px 0 20px;border-top:1px solid rgba(255,255,255,.06);">'+
        '<span style="font-size:16px;font-weight:600;color:#f5c842;font-family:Syne,sans-serif;animation:fade 2s ease-in-out infinite;display:inline-block;">Analyzing pronunciation...</span>'+
      '</div>';
    if(nextBtn)nextBtn.style.display='block';
    // Analyze pronunciation of the target phrase
    if(window._ab&&q.target){
      mcAnalyzePronunciation(q.target);
    }
  } else {
    mcScores.push(0);
    result.className='';result.style='';
    var correctText=q.options[q.correct];
    var saidText=transcript||'...';
    result.innerHTML=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;">'+
        '<div style="background:rgba(192,57,43,.15);border-radius:10px;padding:12px;">'+
          '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#ef5350;margin-bottom:6px;">You said</div>'+
          '<div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.5);">'+saidText+'</div>'+
        '</div>'+
        '<div style="background:rgba(45,122,58,.2);border-radius:10px;padding:12px;">'+
          '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6fcf6f;margin-bottom:6px;">Correct</div>'+
          '<div style="font-size:14px;font-weight:700;color:#6fcf6f;">'+correctText+'</div>'+
        '</div>'+
      '</div>'+
      '<div style="margin-top:10px;font-size:12px;color:rgba(255,255,255,.35);text-align:center;">Try saying it again</div>';
    if(nextBtn)nextBtn.style.display='block';
  }
  var l=document.getElementById('mcMicLbl');if(l)l.textContent='Tap to try again';
}

function mcAnalyzePronunciation(target){
  if(!window._ab)return;
  var result=document.getElementById('mcResult');
  // analyzing state shown in correct result HTML
  fetch(W+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:window._ab,target:target,mimeType:window._am||'audio/webm'})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!result)return;
      var ws=d.wordScores||[];
      if(!ws.length)return;
      var pills='';
      for(var i=0;i<ws.length;i++){
        var ww=ws[i];
        var wordHtml=ww.word;
        if(ww.allSyllables&&ww.allSyllables.length>0){
          var hasBad=false;
          for(var sx=0;sx<ww.allSyllables.length;sx++){if(ww.allSyllables[sx].bad)hasBad=true;}
          if(hasBad){
            wordHtml='';
            for(var si=0;si<ww.allSyllables.length;si++){
              var s2=ww.allSyllables[si];
              wordHtml+='<span class="'+(s2.bad?'syl-bad':'syl-ok')+'">'+s2.letters+'</span>';
            }
          }
        }
        // Dark-card pill colors
        var darkStyle=ww.score>=85
          ?'background:rgba(45,122,58,.3);color:#6fcf6f'
          :ww.score>=75
          ?'background:rgba(245,200,66,.2);color:#f5c842'
          :'background:rgba(192,57,43,.3);color:#ef5350';
        pills+='<div class="pill" style="'+darkStyle+'"><span class="pt2">'+wordHtml+'</span><span class="ps">'+ww.score+'%</span></div>';
      }
      // Replace analyzing text with pills
      var existing=
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.08);">'+
          '<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" stroke="#6fcf6f" stroke-width="1.5"/><path d="M7 11l3 3 5-5" stroke="#6fcf6f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          '<span style="font-size:18px;font-weight:700;color:#6fcf6f;font-family:Syne,sans-serif;">Correct!</span>'+
        '</div>';
      var avg=ws.reduce(function(a,w){return a+w.score;},0)/ws.length;
      var avgR=Math.round(avg);
      var circCol=avgR>=85?'rgba(45,122,58,.3)':avgR>=75?'rgba(245,200,66,.2)':'rgba(192,57,43,.3)';
      var circTxt=avgR>=85?'#6fcf6f':avgR>=75?'#f5c842':'#ef5350';
      result.innerHTML=existing+
        '<div style="margin-top:12px;background:rgba(255,255,255,.08);border-radius:12px;padding:14px;">'+
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">'+
            '<div style="width:44px;height:44px;border-radius:50%;background:'+circCol+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:'+circTxt+';flex-shrink:0;">'+avgR+'%</div>'+
            '<div style="font-size:13px;color:rgba(255,255,255,.5);">Pronunciation of target phrase</div>'+
          '</div>'+
          '<div class="wp">'+pills+'</div>'+
        '</div>';
    }).catch(function(){});
}

function speakCoach(btn){
  // Prevent double-click while fetching
  if(btn._fetching)return;
  // If playing, stop
  if(window._coachAudio&&!window._coachAudio.paused){
    window._coachAudio.pause();window._coachAudio=null;
    btn.innerHTML='&#128266;';btn.classList.remove('playing','loading');btn.style.opacity='1';return;
  }
  if(!window._coachText)return;
  // If already cached, play instantly
  if(window._coachAudioUrl){
    window._coachAudio=new Audio(window._coachAudioUrl);
    btn.innerHTML='&#9209;&#65038;';btn.classList.add('playing');
    window._coachAudio.play();
    window._coachAudio.onended=function(){
      window._coachAudio=null;
      var b2=document.getElementById('coachAudioBtn');
      if(b2){b2.innerHTML='&#128266;';b2.classList.remove('playing');}
    };
    return;
  }
  // Fetch from ElevenLabs
  btn._fetching=true;
  btn.innerHTML='&#9203;&#65038;';btn.classList.add('loading');btn.style.opacity='0.7';
  fetch(W+'/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:window._coachText,lang:'pt'})})
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.blob();})
    .then(function(b){
      btn._fetching=false;btn.style.opacity='1';
      var url=URL.createObjectURL(b);
      window._coachAudioUrl=url;// Cache it
      window._coachAudio=new Audio(url);
      btn.innerHTML='&#9209;&#65038;';btn.classList.remove('loading');btn.classList.add('playing');
      window._coachAudio.play();
      window._coachAudio.onended=function(){
        window._coachAudio=null;
        var b2=document.getElementById('coachAudioBtn');
        if(b2){b2.innerHTML='&#128266;';b2.classList.remove('playing');b2.style.opacity='1';}
      };
    })
    .catch(function(){
      btn._fetching=false;
      btn.innerHTML='&#128266;';btn.classList.remove('loading','playing');btn.style.opacity='1';
    });
}

function closeWordPopup(e){
  if(e&&e.target!==document.getElementById('wpop'))return;
  if(wpopCorrectAudio){wpopCorrectAudio.pause();wpopCorrectAudio=null;}
  if(wpopRecAudio){wpopRecAudio.pause();wpopRecAudio=null;}
  document.getElementById('wpop').classList.remove('show');
}
function playCorrectWord(btn){var word=btn.getAttribute('data-word');
  if(wpopCorrectAudio&&!wpopCorrectAudio.paused){
    wpopCorrectAudio.pause();wpopCorrectAudio=null;
    btn.classList.remove('active','loading');return;
  }
  btn.classList.add('loading');
  var icon=btn.querySelector('.wpop-btn-icon');
  if(icon)icon.textContent='⏳';
  fetch(W+'/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:word})})
    .then(function(r){return r.blob();})
    .then(function(b){
      var url=URL.createObjectURL(b);
      wpopCorrectAudio=new Audio(url);
      btn.classList.remove('loading');btn.classList.add('active');
      if(icon)icon.textContent='🔊';
      wpopCorrectAudio.play();
      wpopCorrectAudio.onended=function(){
        btn.classList.remove('active');
        if(icon)icon.textContent='🔊';
        URL.revokeObjectURL(url);
      };
    }).catch(function(){
      btn.classList.remove('active','loading');
      if(icon)icon.textContent='🔊';
    });
}
function playWordClip(start,end,btn){
  if(wpopRecAudio&&!wpopRecAudio.paused){
    wpopRecAudio.pause();wpopRecAudio=null;
    btn.classList.remove('active');return;
  }
  if(!window._recUrl)return;
  var startSec=start*0.01;
  var endSec=end*0.01;
  var audio=new Audio(window._recUrl);
  audio.currentTime=startSec;
  wpopRecAudio=audio;
  btn.classList.add('active');
  var icon=btn.querySelector('.wpop-btn-icon');
  if(icon)icon.textContent='▶';
  audio.play();
  var iv=setInterval(function(){
    if(audio.currentTime>=endSec){
      audio.pause();clearInterval(iv);
      btn.classList.remove('active');
      wpopRecAudio=null;
      if(icon)icon.textContent='▶';
    }
  },50);
}

  var correct=0;

  var optRows='';
  for(var i=0;i<4;i++){
    var ov=opts[i].replace(/"/g,'&quot;');
    optRows+='<div class="mc-opt-row">'+
      '<input type="radio" class="mc-opt-radio" name="mc-correct-'+Date.now()+'-'+Math.random()+'" value="'+i+'"'+(correct===i?' checked':'')+'>'+
      '<input class="mc-opt-inp" placeholder="Option '+(i+1)+'..." value="'+ov+'">'+

    '<input class="mc-q" placeholder="Question (e.g. How do you feel about the meeting?)" value="'+qv+'">'+

      if(!sents[i]||typeof sents[i]!=='string')continue;
      var d=document.createElement('div');d.className='trow2';
      var sv=sents[i].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      d.innerHTML='<input class="tinp" value="'+sv+'"/><button class="tdel" onclick="this.parentElement.remove()">x</button>';
      c.appendChild(d);
    }
    inp.value='';
    status.textContent='Imported '+sents.length+' sentences!';
  }catch(e){
    status.textContent='Invalid JSON: '+e.message;
  }
}

function saveMC(){
  var rows=document.querySelectorAll('.mc-row');
  var qs=[];
  for(var ri=0;ri<rows.length;ri++){
    var row=rows[ri];
    var question=row.querySelector('.mc-q').value.trim();
    if(!question)continue;
    var optInps=row.querySelectorAll('.mc-opt-inp');
    var radioInps=row.querySelectorAll('.mc-opt-radio');
    var opts=[];
    var correct=0;
    for(var i=0;i<4;i++){opts.push(optInps[i]?optInps[i].value.trim():'');}
    for(var i=0;i<radioInps.length;i++){if(radioInps[i].checked)correct=parseInt(radioInps[i].value);}
    var target=optInps[4]?optInps[4].value.trim():'';
    qs.push({question:question,options:opts,correct:correct,target:target});
  }
  if(!qs.length){document.getElementById('tmsg').textContent='Add at least one question.';return;}
  document.getElementById('tmsg').textContent='Saving...';
  fetch(W+'/mc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:'streetway2024',questions:qs})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){MCQS=qs;document.getElementById('tmsg').textContent='Saved!';setTimeout(closeTeacher,2000);}
      else document.getElementById('tmsg').textContent='Error saving.';
    }).catch(function(e){document.getElementById('tmsg').textContent='Error: '+e.message;});
}
function importMCJSON(){
  var inp=document.getElementById('importInp');
  var status=document.getElementById('importStatus');
  var text=inp?inp.value.trim():'';
  if(!text){status.textContent='Please paste JSON first.';return;}
  try{
    text=text.replace(/```json|```/g,'').trim();
    var questions=JSON.parse(text);
    if(!Array.isArray(questions))throw new Error('Must be a JSON array');
    for(var i=0;i<questions.length;i++) addMCRow(questions[i]);
    inp.value='';
    status.textContent='Imported '+questions.length+' questions successfully!';
    var rows=document.getElementById('mcrows');
    if(rows)rows.scrollIntoView({behavior:'smooth',block:'start'});
  }catch(e){
    status.textContent='Invalid JSON: '+e.message;
  }
}

function generateMCWithAI(){
  var inp=document.getElementById('aiGenInp');
  var btn=document.getElementById('aiGenBtn');
  var status=document.getElementById('aiGenStatus');
  var topic=inp?inp.value.trim():'';
  if(!topic){status.textContent='Please enter some vocabulary or a topic first.';return;}
  btn.disabled=true;
  status.textContent='Generating questions...';
  var prompt='You are an English teacher creating speaking multiple choice exercises for Brazilian students.'+
    ' Based on this vocabulary/topic: '+topic+
    ' Create 5 conversational multiple choice questions.'+
    ' Each question should: be a realistic conversational situation, have 4 natural spoken answer options, one clearly correct answer that uses the target expression naturally.'+
    ' Respond ONLY with a JSON array, no markdown, no explanation. Format exactly like this:'+
    ' [{"question":"...","options":["...","...","...","..."],"correct":0,"target":"..."},...]'+
    ' The "correct" field is the index (0-3) of the correct option.'+
    ' The "target" field is the specific phrase or expression to practice pronunciation of.';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:2000,
      messages:[{role:'user',content:prompt}]
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    var text=(d.content||[]).map(function(b){return b.text||'';}).join('');
    // Strip any markdown backticks
    text=text.replace(/```json|```/g,'').trim();
    var questions=JSON.parse(text);
    if(!Array.isArray(questions))throw new Error('Invalid response');
    // Add to existing rows
    for(var qi=0;qi<questions.length;qi++) addMCRow(questions[qi]);
    status.textContent=questions.length+' questions generated! Review and save.';
    btn.disabled=false;
    inp.value='';
  })
  .catch(function(e){
    status.textContent='Error: '+e.message+'. Please try again.';
    btn.disabled=false;
  });
}

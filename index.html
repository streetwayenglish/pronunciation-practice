<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Street Way — Pronunciation Practice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --surface: #ffffff; --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.25);
      --text: #1a1a1a; --muted: #666; --hint: #999;
      --blue: #378ADD; --blue-light: #E6F1FB; --blue-dark: #0C447C;
      --red: #E24B4A; --red-light: #FCEBEB; --red-dark: #A32D2D;
      --green: #639922; --green-light: #EAF3DE; --green-dark: #3B6D11;
      --amber: #BA7517; --amber-light: #FAEEDA; --amber-dark: #633806;
      --radius: 12px; --radius-sm: 7px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .header { margin-bottom: 2rem; text-align: center; }
    .logo { height: 120px; width: auto; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }
    .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .header p { font-size: 15px; color: var(--muted); }
    .warning { background: var(--red-light); border: 1px solid var(--red); border-radius: var(--radius); padding: 1rem 1.25rem; font-size: 14px; color: var(--red-dark); margin-bottom: 1rem; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
    .panel-header { padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .sentence-list { padding: 6px; }
    .sentence-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s; border: 1px solid transparent; }
    .sentence-item:hover { background: var(--bg); }
    .sentence-item.active { background: var(--blue-light); border-color: var(--blue); }
    .s-num { font-size: 12px; color: var(--hint); min-width: 20px; }
    .s-text { flex: 1; font-size: 14px; color: var(--text); }
    .s-done { color: var(--green); font-size: 15px; }
    .practice-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .target-label { font-size: 11px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .sentence-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 1.5rem; }
    .target-sentence { flex: 1; font-size: 24px; font-weight: 500; color: var(--text); line-height: 1.4; }
    .listen-btn { flex-shrink: 0; width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: white; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.15s; margin-top: 4px; }
    .listen-btn:hover { background: var(--blue-light); transform: scale(1.07); }
    .listen-btn.speaking { background: var(--blue-light); border-color: var(--blue); animation: speakpulse 0.8s infinite alternate; }
    @keyframes speakpulse { from { box-shadow: 0 0 0 0 rgba(55,138,221,0.3); } to { box-shadow: 0 0 0 8px rgba(55,138,221,0); } }
    .nav-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .btn-nav { flex: 1; padding: 8px; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; }
    .btn-nav:hover { background: var(--bg); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .mic-area { display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem; background: var(--bg); border-radius: var(--radius); margin-bottom: 1rem; }
    .mic-btn { width: 78px; height: 78px; border-radius: 50%; border: none; background: var(--blue); color: white; font-size: 30px; cursor: pointer; transition: transform 0.15s; display: flex; align-items: center; justify-content: center; }
    .mic-btn:hover { transform: scale(1.06); }
    .mic-btn.recording { background: var(--red); animation: pulse 1.2s infinite; }
    .mic-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(226,75,74,0.35); } 50% { box-shadow: 0 0 0 14px rgba(226,75,74,0); } }
    .mic-label { font-size: 14px; color: var(--muted); text-align: center; }
    .transcript-box { width: 100%; min-height: 54px; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 15px; color: var(--text); line-height: 1.5; }
    .placeholder { color: var(--hint); font-style: italic; }
    .btn-primary { width: 100%; padding: 12px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; margin-bottom: 1rem; font-family: inherit; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .feedback-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .feedback-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .feedback-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .score-badge { font-size: 13px; font-weight: 600; padding: 3px 12px; border-radius: 20px; }
    .score-great { background: var(--green-light); color: var(--green-dark); }
    .score-ok { background: var(--amber-light); color: var(--amber-dark); }
    .score-low { background: var(--red-light); color: var(--red-dark); }
    .word-comparison { margin-bottom: 14px; line-height: 2.4; }
    .word { display: inline-block; margin: 2px 3px; padding: 3px 9px; border-radius: 5px; font-size: 17px; }
    .word-correct { background: var(--green-light); color: var(--green-dark); }
    .word-missing { background: var(--amber-light); color: var(--amber-dark); font-style: italic; }
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
    .ai-feedback { font-size: 15px; color: var(--text); line-height: 1.8; }
    .ai-feedback strong { font-weight: 600; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .dots { display: inline-flex; gap: 4px; }
    .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; display: inline-block; }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .empty-practice { text-align: center; padding: 3rem 1rem; color: var(--hint); font-size: 15px; }

    /* Teacher panel */
    .teacher-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .teacher-modal { background: var(--surface); border-radius: var(--radius); padding: 1.75rem; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .teacher-modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 1.25rem; }
    .teacher-sentence-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .teacher-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; }
    .teacher-input:focus { border-color: var(--blue); background: white; }
    .btn-del-s { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; font-size: 13px; cursor: pointer; color: var(--muted); }
    .btn-del-s:hover { background: var(--red-light); color: var(--red-dark); border-color: var(--red); }
    .btn-add-s { width: 100%; padding: 8px; background: none; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; margin-bottom: 1.25rem; }
    .btn-add-s:hover { background: var(--bg); }
    .teacher-actions { display: flex; gap: 8px; }
    .btn-save-teacher { flex: 1; padding: 10px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-save-teacher:hover { opacity: 0.88; }
    .btn-cancel-teacher { padding: 10px 16px; background: none; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; color: var(--muted); cursor: pointer; font-family: inherit; }
    .btn-cancel-teacher:hover { background: var(--bg); }
    .save-status { font-size: 13px; text-align: center; margin-top: 10px; }

    /* Login */
    .login-box { background: var(--surface); border-radius: var(--radius); padding: 1.75rem; max-width: 360px; width: 100%; }
    .login-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .login-box p { font-size: 14px; color: var(--muted); margin-bottom: 1.25rem; }
    .pw-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; outline: none; margin-bottom: 10px; }
    .pw-input:focus { border-color: var(--blue); }
    .btn-login { width: 100%; padding: 10px; background: var(--blue); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .pw-error { font-size: 13px; color: var(--red-dark); margin-top: 6px; }

    @media (max-width: 500px) { .target-sentence { font-size: 20px; } .mic-btn { width: 66px; height: 66px; font-size: 26px; } .listen-btn { width: 44px; height: 44px; font-size: 18px; } }
  </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAK+ZflxCS0jCia/IAAAAASUVORK5CYII=" alt="Street Way English" />
    <h1>Pronunciation Practice</h1>
    <p>Listen to the sentence, record yourself, and get AI-powered feedback.</p>
  </div>

  <div class="warning" id="noSpeechWarn" style="display:none;">
    Speech recording requires <strong>Google Chrome</strong> or <strong>Microsoft Edge</strong>. The Listen button works in any browser.
  </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Practice Sentences</span>
    </div>
    <div class="sentence-list" id="sentenceList"><div style="padding:1rem;color:var(--hint);font-size:14px;">Loading sentences…</div></div>
  </div>

  <div id="practiceArea">
    <div class="empty-practice">Select a sentence above to start practicing</div>
  </div>
</div>

<script>
const WORKER_URL = 'https://billowing-sunset-c961.lucaswassup.workers.dev';
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) document.getElementById('noSpeechWarn').style.display = 'block';

const DEFAULT_SENTENCES = [
  "The weather is beautiful today.",
  "She sells seashells by the seashore.",
  "How much wood would a woodchuck chuck?",
  "I would like to schedule a meeting for Thursday.",
  "The quick brown fox jumps over the lazy dog.",
  "She thought carefully before giving her answer.",
  "The children played happily in the park all afternoon.",
  "Please speak slowly and clearly so everyone can understand."
];

let sentences = [];
let completed = JSON.parse(localStorage.getItem('pron_done') || '{}');
let curIdx = -1, isRec = false, recog = null, transcript = '', isSpeaking = false;

// Load sentences from worker
async function loadSentences() {
  try {
    const res = await fetch(WORKER_URL + '/sentences');
    const data = await res.json();
    sentences = data.length > 0 ? data : DEFAULT_SENTENCES;
  } catch(e) {
    sentences = DEFAULT_SENTENCES;
  }
  renderList();
}
loadSentences();

// Teacher panel — accessible via ?teacher in URL
if (window.location.search.includes('teacher')) {
  showTeacherLogin();
}

function showTeacherLogin() {
  const overlay = document.getElementById('teacherOverlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="login-box">
      <h2>Teacher Panel</h2>
      <p>Enter your password to edit sentences.</p>
      <input type="password" class="pw-input" id="pwInput" placeholder="Password…" onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="btn-login" onclick="doLogin()">Enter</button>
      <div class="pw-error" id="pwError"></div>
    </div>`;
  setTimeout(() => document.getElementById('pwInput')?.focus(), 100);
}

function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === 'streetway2024') {
    showTeacherPanel();
  } else {
    document.getElementById('pwError').textContent = 'Wrong password. Try again.';
  }
}

function showTeacherPanel() {
  const overlay = document.getElementById('teacherOverlay');
  overlay.style.display = 'flex';
  const rows = sentences.map((s, i) => `
    <div class="teacher-sentence-row" id="trow${i}">
      <input class="teacher-input" value="${s.replace(/"/g, '&quot;')}" id="ts${i}" />
      <button class="btn-del-s" onclick="deleteTeacherRow(${i})">✕</button>
    </div>`).join('');
  overlay.innerHTML = `
    <div class="teacher-modal">
      <h2>Edit Practice Sentences</h2>
      <div id="teacherRows">${rows}</div>
      <button class="btn-add-s" onclick="addTeacherRow()">+ Add sentence</button>
      <div class="teacher-actions">
        <button class="btn-cancel-teacher" onclick="closeTeacher()">Cancel</button>
        <button class="btn-save-teacher" onclick="saveTeacher()">Save & publish</button>
      </div>
      <div class="save-status" id="saveStatus"></div>
    </div>`;
}

function addTeacherRow() {
  const container = document.getElementById('teacherRows');
  const i = container.children.length;
  const div = document.createElement('div');
  div.className = 'teacher-sentence-row';
  div.id = 'trow' + i;
  div.innerHTML = `<input class="teacher-input" value="" id="ts${i}" placeholder="Type new sentence…" /><button class="btn-del-s" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(div);
  div.querySelector('input').focus();
}

function deleteTeacherRow(i) {
  document.getElementById('trow' + i)?.remove();
}

async function saveTeacher() {
  const inputs = document.querySelectorAll('.teacher-input');
  const newSentences = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
  if (newSentences.length === 0) { document.getElementById('saveStatus').textContent = 'Add at least one sentence.'; return; }
  document.getElementById('saveStatus').textContent = 'Saving…';
  try {
    const res = await fetch(WORKER_URL + '/sentences', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: 'streetway2024', sentences: newSentences })
    });
    const data = await res.json();
    if (data.ok) {
      sentences = newSentences;
      completed = {};
      localStorage.setItem('pron_done', '{}');
      renderList();
      document.getElementById('saveStatus').textContent = '✓ Saved! Students will see the new sentences immediately.';
      setTimeout(() => closeTeacher(), 2000);
    } else {
      document.getElementById('saveStatus').textContent = 'Error saving. Try again.';
    }
  } catch(e) {
    document.getElementById('saveStatus').textContent = 'Error: ' + e.message;
  }
}

function closeTeacher() {
  document.getElementById('teacherOverlay').style.display = 'none';
  // Remove ?teacher from URL without reload
  history.replaceState({}, '', window.location.pathname);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const btn = document.getElementById('listenBtn');
  if (isSpeaking) { isSpeaking = false; if(btn){btn.textContent='🔊';btn.classList.remove('speaking');} return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.88; isSpeaking = true;
  if(btn){btn.textContent='⏹';btn.classList.add('speaking');}
  u.onend = u.onerror = () => { isSpeaking = false; const b = document.getElementById('listenBtn'); if(b){b.textContent='🔊';b.classList.remove('speaking');} };
  window.speechSynthesis.speak(u);
}

function renderList() {
  document.getElementById('sentenceList').innerHTML = sentences.map((s, i) => `
    <div class="sentence-item ${i===curIdx?'active':''}" onclick="selectSentence(${i})">
      <span class="s-num">${i+1}</span>
      <span class="s-text">${s}</span>
      ${completed[i] ? '<span class="s-done">✓</span>' : ''}
    </div>`).join('');
}

function selectSentence(i) {
  window.speechSynthesis && window.speechSynthesis.cancel(); isSpeaking = false;
  curIdx = i; transcript = ''; renderList(); renderPractice();
}

function renderPractice() {
  const area = document.getElementById('practiceArea');
  if (curIdx < 0 || curIdx >= sentences.length) { area.innerHTML = '<div class="empty-practice">Select a sentence above to start practicing</div>'; return; }
  const s = sentences[curIdx];
  const safe = s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  area.innerHTML = `
    <div class="practice-panel">
      <div class="target-label">Read this sentence aloud</div>
      <div class="sentence-row">
        <div class="target-sentence">${s}</div>
        <button class="listen-btn" id="listenBtn" onclick="speak('${safe}')" title="Hear the correct pronunciation">🔊</button>
      </div>
      <div class="nav-row">
        <button class="btn-nav" onclick="goTo(${curIdx-1})" ${curIdx===0?'disabled':''}>← Previous</button>
        <button class="btn-nav" onclick="goTo(${curIdx+1})" ${curIdx===sentences.length-1?'disabled':''}>Next →</button>
      </div>
      <div class="mic-area">
        <button class="mic-btn" id="micBtn" onclick="toggleRec()" ${!SR?'disabled':''}>🎤</button>
        <div class="mic-label" id="micLbl">${SR ? 'Tap to start recording' : 'Use Chrome or Edge to record'}</div>
        <div class="transcript-box" id="tBox"><span class="placeholder">Your spoken words will appear here…</span></div>
      </div>
      <button class="btn-primary" id="checkBtn" onclick="checkPron()" disabled>Get AI pronunciation feedback</button>
    </div>
    <div id="feedbackArea"></div>`;
}

function goTo(i) { if(i<0||i>=sentences.length)return; window.speechSynthesis&&window.speechSynthesis.cancel(); isSpeaking=false; curIdx=i; transcript=''; renderList(); renderPractice(); }
function toggleRec() { isRec ? stopRec() : startRec(); }
function startRec() {
  if (!SR) return;
  recog = new SR(); recog.continuous = true; recog.interimResults = true; recog.lang = 'en-US';
  isRec = true; transcript = '';
  const btn = document.getElementById('micBtn'), lbl = document.getElementById('micLbl');
  if(btn){btn.classList.add('recording');btn.textContent='⏹';}
  if(lbl) lbl.textContent = 'Recording… tap to stop';
  recog.onresult = e => {
    let interim='', final='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}
    transcript = (transcript+' '+final).trim();
    const box = document.getElementById('tBox');
    if(box) box.innerHTML = transcript + (interim ? ` <em style="color:#bbb">${interim}</em>` : '');
    const cb = document.getElementById('checkBtn'); if(cb&&transcript) cb.disabled = false;
  };
  recog.onerror = e => { const l=document.getElementById('micLbl'); if(l) l.textContent='Mic error: '+e.error; stopRec(); };
  recog.onend = () => { if(isRec) recog.start(); };
  recog.start();
}
function stopRec() {
  isRec = false; if(recog){recog.onend=null;recog.stop();}
  const btn=document.getElementById('micBtn'),lbl=document.getElementById('micLbl');
  if(btn){btn.classList.remove('recording');btn.textContent='🎤';}
  if(lbl) lbl.textContent = 'Tap to record again';
}

function norm(w){return w.toLowerCase().replace(/[^a-z0-9']/g,'');}
function lcs(a,b){
  const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  const pairs=[];let i=m,j=n;
  while(i>0&&j>0){if(a[i-1]===b[j-1]){pairs.push({ti:i-1,si:j-1});i--;j--;}else if(dp[i-1][j]>dp[i][j-1])i--;else j--;}
  return pairs.reverse();
}

async function checkPron() {
  stopRec(); if(!transcript) return;
  const target = sentences[curIdx], spoken = transcript;
  const tW=target.split(/\s+/).filter(Boolean),sW=spoken.split(/\s+/).filter(Boolean);
  const tN=tW.map(norm),sN=sW.map(norm);
  const match=lcs(tN,sN);
  const matchedT=new Set(match.map(m=>m.ti)),matchedS=new Set(match.map(m=>m.si));
  const score=Math.round((match.length/tN.length)*100);
  const targetHTML=tW.map((w,i)=>matchedT.has(i)?`<span class="word word-correct">${w}</span>`:`<span class="word word-missing">${w}</span>`).join(' ');
  const missingW=tW.filter((_,i)=>!matchedT.has(i));
  const extraW=sW.filter((_,i)=>!matchedS.has(i));
  let badgeClass='score-low',badgeText=score+'% — Continue praticando';
  if(score>=90){badgeClass='score-great';badgeText=score+'% — Excelente!';}
  else if(score>=65){badgeClass='score-ok';badgeText=score+'% — Bom esforço!';}

  const feedbackArea = document.getElementById('feedbackArea');
  feedbackArea.innerHTML = `
    <div class="feedback-card">
      <div class="feedback-top"><span class="feedback-title">Resultado</span><span class="score-badge ${badgeClass}">${badgeText}</span></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green-light);border:1px solid var(--green)"></div>Correto</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber-light);border:1px solid var(--amber)"></div>Ausente / pouco claro</div>
      </div>
      <div class="word-comparison">${targetHTML}</div>
      <hr class="divider">
      <div class="feedback-top" style="margin-bottom:10px;">
        <span class="feedback-title">Coach de IA</span>
        <div class="dots"><span></span><span></span><span></span></div>
      </div>
      <div class="ai-feedback" id="aiFeedback">Analisando sua pronúncia…</div>
    </div>`;

  completed[curIdx] = true; localStorage.setItem('pron_done', JSON.stringify(completed)); renderList();

  const missingNote = missingW.length>0 ? `Palavras ausentes/pouco claras: ${missingW.join(', ')}.` : 'Todas as palavras foram reconhecidas.';
  const extraNote = extraW.length>0 ? `Palavras extras ouvidas: ${extraW.join(', ')}.` : '';
  const prompt = `Você é um coach de pronúncia de inglês caloroso e encorajador para estudantes brasileiros aprendendo inglês.

Frase alvo: "${target}"
O aluno disse: "${spoken}"
Precisão de palavras: ${score}%
${missingNote}
${extraNote}

Dê um feedback de pronúncia amigável e específico EM PORTUGUÊS BRASILEIRO:
1. Uma abertura encorajadora breve
2. Dicas fonéticas para palavras ausentes ou mal pronunciadas (explique a posição da boca/língua/lábios de forma simples)
3. Uma dica sobre ritmo ou acentuação natural para esta frase
4. Uma frase motivadora de encerramento

Máximo 180 palavras. Use linguagem simples. Use quebras de linha entre seções, sem cabeçalhos markdown.`;

  try {
    const res = await fetch(WORKER_URL + '/', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]}) });
    if(!res.ok){const err=await res.json();throw new Error(err.error?.message||'API error '+res.status);}
    const data = await res.json();
    const text = data.content.map(b=>b.text||'').join('').replace(/\n/g,'<br>');
    document.getElementById('aiFeedback').innerHTML = text;
    feedbackArea.querySelector('.dots')?.remove();
  } catch(err) {
    document.getElementById('aiFeedback').innerHTML = `<span style="color:var(--red-dark)">Não foi possível obter feedback: ${err.message}</span>`;
    feedbackArea.querySelector('.dots')?.remove();
  }
}
</script>
</body>
</html>
